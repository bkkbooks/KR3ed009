body:
  text: 卷第九治癰瘡瘍久不合僕嘗讀本草露蜂房蛇蛻反亂髮各燒灰每味取一錢匕酒調服治瘡久不合神驗僕屢試之燒灰略存性治癰疽忍冬嫩苗一握葉尖圓莖生莖葉皆有毛生田野籬落處處有之兩葉對生春夏新葉梢尖而色嫩緑柔薄秋冬即堅厚色深而圓得霜則葉卷而色紫經冬不凋四月開花極芬香聞數步初開色白數日則變黃每黃白相間故一名金銀花花開曳蕊數莖如絲故一名老翁須一名金叉股冬間葉圓厚似薜荔枝一名大薜荔可移根庭檻間以備急花氣可愛似茉莉瑞香甘草生用半兩上忍冬爛研同甘草入酒一斤半沙瓶中塞口煮兩食頃溫服豫在江西有醫僧鑑清善治發背疽得其方用老翁須豫頗神祕之後十年過金陵聞醫王琪亦善治瘍其方用水楊藤求得觀之乃老翁須也又數年友人王子淵曰言得神方嘗活數人方用大薜荔又過歷陽杜醫者治瘍常以二萬錢活一人用千金藤過宣州寧國尉王子駁傳一方用金銀花海州士人劉純臣傳一方用金叉股此數君皆自神其術求其草視之蓋一物也豫以本草考之乃忍冬也古人但為補藥未嘗治疽其用甘草煮飲之法制方皆同若倉卒求不獲只用干葉為散每服三方寸匕甘草方寸匕酒煮服之亦可然不及生者小還丹治背疽癰癤一切膿腫膩粉水銀硫黃各一分同研大巴豆肉十四個上將巴豆單覆排銚底以三物按上巴豆令平以甕器盞蓋之四面濕紙勿令氣泄炭火四面緩緩燒時於冷水中蘸銚底少時又燒頻蘸為善其盞上底內滴水一點如大豆干則再滴以三滴乾為度候冷研陳米飲丸作二十三丸每服一丸熟水吞下疏下惡物以白粥補之豫族父藏此方未易與人吳中人往往知此藥莫能得真方一丸活一人曾無死者才取下即時不痛其瘡亦干治發疽柞葉湯柞木葉干四兩乾荷葉四兩萱草根干二兩甘草節一兩地榆一兩上細銼每服半兩水二碗煎去半分二服早晚各服二服滓並煎作一服有膿血者自安膿血在內者自大腸下未成者自消忌一切毒物有瘡者貼後藥通明牛皮膠一兩水半升熬令化黃丹一兩入膠中煮三五沸上放溫冷以雞羽敷瘡口有瘡即斂未成瘡者塗腫處即內消元豐中丞相荊公疽發背醫攻之皆不效漸覺昏懵都不省人事勢已危甚上元知縣朝奉郎梁彥意有此藥自言其效如神祕其方但得藥荊公服之痢下惡物一升許遂瘥乃以方獻丞相豫從丞相得之此藥常人服之並不疏轉但逐膿血耳治腫毒癰疽療腫毒癰疽未潰令消已潰令速愈草烏頭屑水調雞羽掃腫上有瘡者先以膏藥貼定無令藥著瘡人有病瘡甚者塗之坐中便見皮皺稍稍而消初塗病人覺冷如水瘡乃不痛登州孫醫白膏尤善消腫柳白皮半兩揩洗陰乾白臘四錢黃丹二錢胡粉二兩油生四兩熟三兩八錢商陸根三分上先熟油入皮根候變色去滓入藥攪良久下此藥尤善消腫及墜擊所傷登州孫醫每以三百錢售一靨雲母膏出博濟方雲母光明者薄揭先煮硝石研甘草各四兩槐枝柏葉近道者不堪柳枝桑白皮各二兩陳橘皮一兩桔梗防風桂心蒼朮菖蒲黃芩高良薑柴胡厚朴人參芍藥胡椒子龍膽草白芷白芨白蘞黃耆芎藭茯苓夜合花附子炮各半兩以上㕮咀次煎鹽花松脂當歸木香麒麟竭沒藥麝香乳香以上各半兩為末黃丹十四兩羅水銀二兩大麻油六斤上先煉油令香下雲母良久投附子以上候藥焦黃住火令冷以綿濾去滓始下末皆須緩火常以柳木篦攪勿停手濾畢再入鐺中進火下鹽花至黃丹急攪須臾色變稍益火煎之膏色凝黑少取滴水上凝結不黏手即下火先炙一瓷器令熱傾藥在內候如人體溫以絹袋子盛水銀手彈在膏上如針頭大以蠟紙封合勿令風乾可三二十年不損發背先以敗蒲二斤水三升煮三五沸如人體溫將洗瘡帛拭乾貼藥又以藥一兩分三服用溫酒下未成膿者即瘥更不作瘡瘰癧骨疽毒穿至骨者用藥一兩分三服溫酒下甚者即下惡物兼外貼腸癰以藥半兩分五服甘草湯下未成膿者當時消已有膿者隨藥下膿膿出後每日酒下五丸梧桐子大膿止即住服風眼貼兩太陽腎癰並傷折痛不可忍者酒下半兩老少更以意加減五日一服取盡外貼包裹當時止痛箭頭在肉者外貼每日食少爛緑豆箭頭自出虎豹所傷先以甘草湯洗後貼每日一換不過三貼蛇狗傷生油下十丸梧桐子大仍外貼難産三日不生者溫酒下一分便下血暈欲死以薑汁和小便半升溫酒下十丸梧桐子大死者復生胎死在腹以榆白湯下半兩便生小腸氣茴香湯下一分每日一服血氣當歸酒下一分每日一服中毒溫酒洗汗襪汁每日一服吐瀉出惡物為度一切癰疽瘡癤蟲虺所傷並外貼忌羊肉小朱散治癮疹久不瘥每發先心腹痛痰噦麻痹筋脈不仁成塊赤土有砂石者不可用當歸各等分上冷酒調下二錢日三服兼用塗藥護火草大葉者又名景天生薑和皮不洗等分研鹽量多少上塗摩癢處如遍身癮疹塗發甚處余處自消治發瘡疹不透畜伏危困者以人牙齒三五枚炙令黃為末乳香湯調下目見人屢用之皆一服瘥豫目兩見人用有驗皆得方如上法又一方燒過溫酒下亦可服訖片時瘡便透治瘰癧柴胡湯柴胡荊芥穗秦艽知母當歸官桂藿香甘松敗龜醋炙川烏頭炮地骨皮白膠香芍藥以上各半兩京芎一兩苧根濕稱二兩切碎上件藥並淨洗曬乾搗為粗末每服二錢水一盞入薑三片大棗一個同煎七分去滓服早午食後夜睡各一服三服滓並煎作一服吃忌一切魚面等毒仍忌房事不善忌口及諸事者服此藥無驗又用貼瘡藥石行根不以多少為細末蜜調如膏用貼瘡口三兩日一看後易之此二方得於華亭陶中夫宰君中夫先得柴胡一方用之如神偶於裡巷醫處得貼藥二方皆相須冥若神契中夫在華亭半年之間治二十餘人皆愈此豫寓秀州目見者治瘰癧上鯽魚長三寸者去腸以和皮巴豆填滿腹麻皮纏以一束稈草燒煙盡研粳米粥丸緑豆大粟飲下一丸未利加一丸以利為度每日以此為準常令小利盡劑乃安甚者破者效尤速忌豬肉動風物療風毒瘰癧皂角三十枚塗酥炙去皮方煮去滓何首烏四兩蒸干薄荷四兩精羊肉半斤元參四兩上以皂角水煮肉令爛細研和藥為丸梧桐子大每服二十丸空心溫酒下薄荷湯亦得伯父吏部病瘰癧百療不瘥得此乃愈梁氏老嫗頷下有瘡如垂囊服此藥囊日消至於都平閩僧嘉履病瘰癧服之半月皆愈此皆豫目擊治惡瘡地骨皮散地骨皮一物先刮取浮皮別收之次取浮皮下膩白粉為細散其白粉下堅赤皮細銼與浮皮處為粗未粗末細散各貯之每用粗皮一合許煎濃汁乘熱洗瘡直候藥湯冷以軟帛裛干乃用細散敷之每日洗貼一次以瘥為期梓州路轉運判官張君曾當胸下鋭骨端隱隱微痛後月餘漸有小瘰子如豆粒久之愈大如粟遂潰膿成瘡至痛楚不可臥每夜倚物而坐至曉如此三年不瘥國醫仇鼎沈遇明輩治之都不驗後赴梓州行次華陰道中有舊相識華山道士武元亨來迎就客亭中見之元亨首問胸瘡如何張答以未瘥元亨曰嘗得一藥效驗無比久欲寄去不值便人聞當道華陰特來此奉候已數日今日方欲還山而公適至殆此疾當瘥矣遂手授此方張如法用之始用藥洗極覺暢適異常淋至夜深方用散敷瘡遂不痛是夜得睡至曉自此每夜一次洗貼瘡不復痛矣然尚未斂間或一夜不洗貼便復發痛自此用之更不闕凡四個月瘡雖尚在而起居飲食如常一日瘡忽痛通夕不寐淋之亦痛不止使人視之瘡中生一肉顆如榴子痛已漸定數日間瘡口肉已合自此遂瘥太學博士馬君希孟之弟亦常患瘡於胸腹間久不瘥瘡透腹見膜醫皆閣手得此散用之即瘥楊州士人李君在太學中手掌心生一瘡日久掌穿透唯有筋骨請假歸廣陵值張梓州得此藥遂瘥用之惟須久暫用之未瘥慎不可住但勤施之日久無不瘥者要在勤至不怠乃見奇驗小疔瘡腫疼痛只以枸杞根生銼煎濃汁熱淋亦效治癩方苦胡麻半升別搗天麻二兩乳香三分上荊芥臘茶下三錢忌鹽酒房事動風物一百二十日服半月後兩腰眼灸十四壯此丞相長安公家方已手醫人無數又嘗與方揚州天長東氏賣此藥遂著於淮南若頭面四體風瘡腫癢多汁者六七八服即瘥豫親試之治年久裡外臁瘡不瘥者檳榔半兩干豬糞燒存性半兩龍骨一分水銀粉少許上三味為細末入水銀粉研勻先以鹽湯洗瘡熟絹裛干以生油調藥如膏貼瘡三日一易三五易定瘥忌無鱗魚鮓熱面凡脛內外瘡世謂之裡外臁瘡最難愈此方並前小腸氣方本建安軍人吳美犯偽印坐死司理衆軍王炳之憐其曉事常加存恤其人臨刑泣念曰生平有二方治疾如神常賣以自給可惜死而不傳遂獻炳之屢用有驗豫就炳之求值其遠官數年方得之治下疰腳瘡火府丹甘遂肥實連珠者一兩薄切疏布囊盛芎藭一分銼如豆大上以紙籠大者香爐令至密不漏煙頂留一竅懸甘遂囊於竅間其下燒芎藭一塊令煙入遂欲過再更燃一塊芎藭盡取甘遂為末三十歲以上氣盛者滿三錢虛者平二錢半羯羊腎一對批開勻分藥末在內淨麻皮纏定炭火炙熟勿令焦臨臥爛嚼溫酒下隨人酒量能飲一斗者可飲五升也以高物支起雙腳一服即瘥療久瘡上用豬筒骨中髓以膩粉和為劑復內骨中泥裹火煨香熟出先以溫鹽水浴瘡乃敷之臨安陳令傳極效治瘡疥甚者川烏一兩每個四破之大豆一兩半上同入砂瓶內煮極爛每服一片豆少許空腹酒下豫兄之子病瘡遍體拘攣立不可臥臥不可起服此即瘥治陰瘡癢痛出水久不瘥出靈苑臘茶五倍子等分膩粉少許上先以漿水蔥椒煎湯洗後敷之未瘥再為之又方銅錢一百枚烏梅七個鹽二錢上水一碗半煎一碗熱洗二方相須用之無不即驗治癬方久患用之即瘥決明子不以多少上為末加少水銀粉同為散先以物擦破癬上以散敷之系瘤法上取稻上花蜘蛛十餘個置桃李枝上候垂絲下取東邊者捻為線系定瘤子七日候換瘤子自落沈興宗待制家老姥病瘤如掌拳用此法系之至三換瘤子遂干一夜忽失所在天明前枕邊得之如一干栗治甲疽弩肉裹甲膿血疼痛不瘥出靈苑膽礬燒上先剔去肉中甲敷藥瘡上縱有弩肉一敷即乾落續骨丸出靈苑臘月豬脂五兩蠟半斤以上洗煎鉛丹羅自然銅密陀僧各四兩研細白礬十二兩麒麟竭沒藥乳香硃砂各一兩細研上新鼎中先熔脂次下蠟出鼎於冷處下密陀僧鉛丹自然銅暖火再煎滴入水中不散出鼎於冷處下諸藥用柳篦攪勻瀉入瓷瓶內不停住手攪至凝圓如彈丸且用筍皮之類襯之極冷收貯凡傷折用一丸入少油火上化開塗傷痛處以油單獲之其甚者以燈心裹木夾之更取一丸分作小圓熱蔥酒下痛即止如藥力盡再覺痛更一服痛止即已骨折者兩上便安牙疼甚者貼之即止此方小説所載有人遇異人得之豫家每合以拯人無不應驗治傷折內外損神授散川當歸半兩洗淨別杵鉛粉半兩洛粉最上硼砂二錢上同研勻細每服二錢濃煎蘇枋汁調下若損在腰以上即先吃淡面半碗然後服藥若在腰以下即先服藥後方吃麵仍不住呷蘇枋汁更以糯米為粥入藥末三錢拌和攤在紙上或絹上封裹損處如骨碎則更須用竹木夾定外以紙或衣物包之有長安石使君一日謁尹至闤闠中忽有人呼其姓名石顧之稠人中不及識明日過市復聞其呼顧其人近在馬後問何以見呼其人曰我無求於人以爾有難特來救耳昨日何以不應石辭謝之欲下馬與語其人止之曰市中非下馬之所褫衣領中出一書授之曰有難即用之稠人中遂引去石歸視之乃此方也石到京師趨朝立馬右掖門外為他馬所踢折足墮地又為馬踏手臂折舁至家屢氣絶急合此藥服且裹半夜痛遂止後手足皆完復石有子為朝官知名關中人往往聞此事熙寧中府界教保甲時四方館使劉君提舉每有墮馬或擊刺所傷皆與藥用之即瘥好事者欲其方賂主方者竊得只有兩物而無當歸湯使悉同後豫見兩浙提點刑獄使者云親得其方於石君恐保甲主方者隱其一味耳治骨鯁或竹木簽刺喉中不下出靈苑上臘月取鯇魚膽懸北簷下令乾有鯁即取一皂角子許以酒一合煎化溫啜若得逆便吐骨即隨出若未吐更飲以吐為度雖鯁在腹中日久疼痛黃瘦甚者服之皆出若卒求鯇魚不得蠡魚鱖魚鯽魚皆可然不及鯇魚膽臘月收者最佳有邏卒食雞鯁在腹中常楚痛但食粥每食即如錐刺如是半年支離幾死杖而後能起與此一服大吐覺有一物自口出視之乃雞骨首鋭如刺其尾為飲食所磨瑩滑如珠治諸鯁以木炭皮為細末研令極細如無炭皮堅炭亦可粥飲調下二錢日四五服以鯁下為度此法人家皆有豫在漢東乃目睹其神有劉晦士人鄰家一兒誤吞一錢以此飲之下一物如大烏梅剖之乃炭末裹一錢也池州徐使君極寶此方數數用之未有不效者近歲纍有人言得此方之效不復悉載
