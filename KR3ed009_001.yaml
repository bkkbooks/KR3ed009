body:
  text: 卷第一脈說脈之難古今之所病也至虛有盛候大實有羸狀差之毫釐疑似之間便有死生禍福之異此古今所病也病不可不謁醫而醫之明脈者天下蓋一二數騏驥不時有天下未嘗徒行和扁不世出病者終不徒死亦因其長而護其短爾士大夫多祕所患以求診以驗醫之能否使索病於冥漠之中辨虛實冷熱於疑似之間醫不幸而失終不肯自謂失也則巧飾掩非以全其名至於不救則曰是固難治也間有謹願者雖或因主人之言亦復參以所見兩存而雜治以故藥不效此世之通患而莫之悟也吾平生求醫蓋於平時默驗其工拙至於有疾而求療必先盡告以所患而後求診使醫瞭然知患之所在也然後求之診虛實冷熱先定於中則脈之疑不能惑也故雖中醫治吾病常愈吾求疾愈而已豈以困醫為事哉蒼耳說藥至賤而為世要用未有如蒼耳者他藥雖賤或地有不産惟此藥不為間南北夷夏山澤斥鹵泥土沙石但有地則産其花葉根實皆可食食之如菜亦治病無毒生熟丸散無適不可多食愈善久乃使人骨髓滿肌理如玉長生藥也雜療風痹癱瘓癃瘧瘡癢不可勝言尤治癭金瘡一名鼠黏子一名羊負菜詩謂之卷耳疏謂之枲耳俗謂之道人頭海南無藥惟此藥生舍下多於茨棘遷客之幸也己卯二月望日書記菊菊黃中之色香味和正花葉根實皆長生藥也北方隨秋之早晚大略至菊有微霜乃開獨嶺南不然至冬至乃盛發嶺南地暖百卉造作無時而菊獨開後考其理菊性介然不與百卉盛衰須霜降乃發而嶺海常以冬至微霜故也其天姿高潔如此宜其通仙靈也吾在南海藝菊九畹以十一月望與客泛菊作重九書此為記記海漆吾謫海南以五月出陸藤州自藤至儋野花夾道如芍藥而小紅鮮可愛朴嫩叢生土人云倒黏子花也至儋則已結子如馬乳爛紫可食味甘美中有細核並嚼之瑟瑟有聲亦頗苦澀兒童食之或大便難通葉皆白如石葦之狀野人夏秋痢下食其葉輒已取膠以代柿漆即愈於柿也余久苦小便白濁近又大腑滑百藥不瘥取倒黏子嫩葉酒蒸焙燥為末酒糊丸吞百餘二腑皆平復然後知奇藥也因名之曰海漆而私記之以貽好事君子明年子熟當取子研濾曬煮為膏以劑之不復用糊矣戊寅十一月一日記記益智花海南産益智花實皆長穗而分為三節其實熟否以候歲之豐歉其下節以候早禾其上中亦如之大吉則實凶歲皆不實罕有三節並熟者其為藥也治止水而無益於智智豈求於藥者乎其得名也豈以知歲也耶今日見儋耳圃儒黎子云言候之審矣聊復記之以俟好事者補注本草記食芋岷山之下凶年以蹲鴟為糧不復疫癘知此物之宜人也本草謂芋土芝云益氣充飢惠州富此物人食者不免瘴吳遠遊曰此非芋之罪也芋當去皮濕紙包煨之火過熟乃熱啖之則松而膩能益氣充飢今惠州人皆和皮水煮冷啖堅頑少味其瘴固宜丙子除夜前二日夜飢甚遠遊煨芋兩枚見啖美甚乃為書此帖記王屋山異草王屋山有異草制百毒能於鬼手奪命故山中人謂此草墓頭回蹇葆光托吳遠遊寄來吾聞兵無刃蟲無毒皆不可任若阿羅漢永斷三毒此藥遂無所施耶記元修菜蜀中有菜如豌豆而小食之甚善耕而覆之能肥瘠地性甚熱食之使人呀呷若以少酒曬而蒸之則甚益人而不為害眉山巢谷元修始以其子來黃州江淮間如識之此菜名巢菜黃州人謂之元修菜記蒼朮黃州山中蒼朮至多就野入買之一斤數錢耳此長生藥也人以其易得不復貴重至以熏蚊子此亦可以太息舒州白朮莖葉亦皆相似特花紫耳然至難得三百一兩其效止於和胃氣去遊風非神仙上藥也記流水止水孫思邈千金方人參湯須用流水用止水即不驗人多疑流水止水無別豫嘗見丞相荊公喜放生每日就市買活魚縱之江中莫不洋然惟鰍䱉入江水輒死乃知鰍䱉但可居止水則流水與止水果不同不可不信又鯽魚生流水中則背鱗白生止水中則背鱗黑而味惡此亦一驗也論臟腑古方言雲母粗服則著人肝肺不可去如枇杷狗脊毛皆不可食食射入肝肺世俗似此之論甚多皆謬說也又言人有水喉食喉氣喉亦謬也世傳歐希範真五臟圖亦畫三喉蓋當時驗之不審水與食同嚼而吞豈能口中遂分二喉哉人但有咽有喉二者而已咽則納飲食喉則通氣咽則咽入胃脘次入胃中又次入廣腸下入大小腸喉則下通五臟為出入息五臟之含氣呼吸正如冶家鼓鞴人之飲食藥餌但自咽入腸胃何嘗至五臟凡人肌骨五臟腸胃雖各別其入腹之物英精之氣皆能洞達但滓穢即入二腸故人飲食及服藥既入腹為真氣所蒸英精之氣味以至金石之精者如細研硫黃硃砂乳石之類俱能飛走融結者皆隨真氣洞達肌骨猶如天地之氣貫穿金石土木曾無留礙其餘頑石草木則但氣味洞達爾及其勢盡則滓穢傳於大腸潤濕滲入小腸皆敗物不能變化惟當退泄耳凡所謂某物入肝某物入腎之類但氣味到彼爾其質豈能到彼哉此醫不可不知也論君臣舊說有藥用一君二臣三佐五使之說其意以謂藥雖衆主病者專在一物其他則節給相為用大略相統制如此為宜不必盡然也所謂君者主此一方固無定物也藥性論乃以衆藥之和厚者定為君其次為臣為佐有毒者多為使此謬論也設若欲攻堅積則巴豆輩豈得不為君也論湯散丸湯散丸各有所宜古方用湯最多用丸散者殊少煮散古方無用者惟近世人為之大體欲達五臟四肢者莫如湯欲留膈胃中者莫如散久而後散者莫如丸又無毒者宜湯小毒者宜散大毒者宜用丸又欲速用湯稍緩用散甚緩者用丸此大概也近世用湯者全少應湯者全用煮散大率湯劑氣勢完壯力與丸散倍蓰煮散多者一啜不過三五錢極矣比功效力豈敵湯勢然既力大不宜有失消息用之要在良工難可以定論拘也論採藥古方採草藥多用二八月此殊未當二月草已芽八月苗未枯採掇者易辨識耳在藥則未為良時大率用根者若有宿根須取無莖葉時採則津澤皆歸其根欲驗之但取蘆蔔地黃輩觀無苗時採則實而沉有苗時採則虛而浮其無宿根者即候苗成而未有花時採則根生定而又未衰如今紫草未花時採則根色鮮澤花過而採則根色黯惡此其效也用葉者取葉初長足時取用芽者亦從本說用花者取花初敷時採用實者取成實時採皆不可限以時月緣氣有早晚天時有愆伏如平地三月花者深山中須四月花白樂天遊大林寺詩云人間四月芳菲盡山寺桃花始正開蓋常理也此地勢高下之不同也如筀竹筍有二月生者有三四月生者有五月方生者謂之晚筀稻有七月熟者有八九月熟者有十月熟者謂之晚稻一物同一畦之間自有早晚此物性之不同也嶺嶠微草凌冬不凋並汾喬木望秋先殞諸越則桃李夏實朔漠則桃李夏榮此地氣之不同也同畝之稼則糞溉者先芽一丘之禾則後種者晚實此人力之不同也豈可一切拘以定月哉論橘柚本草注橘皮味苦柚皮味甘此誤也柚皮極苦不可向口皮甘者乃柑耳論鹿茸麋茸按月令冬至麋角解夏至鹿角解陰陽相反如此今人用麋鹿茸作一種殆疏也又有刺麋鹿血以代茸云茸亦血耳此大誤也竊詳古人之意凡含血之物肉差易長其次角難長最後骨難長故人自胚胎至成人二十年骨髓方堅惟鹿茸自生至堅無兩月之久大者乃重二十餘斤其堅如石計一夜須生數兩凡骨之頓成生長神奇無甚於此雖草木之易生者亦無能及之此骨之至強者所以能補骨血堅陽道強精髓也豈可與血為比哉麋茸利補陽鹿茸利補陰凡用茸無須太嫩世謂之茄子茸但真甚難得而其實少功堅者又太老唯長數寸破之肌如朽木茸端如瑪瑙紅玉最善又北方沙漠中有麋麖駝塵強大而色蒼尻黃而無斑亦鹿之類角大有文堅瑩如玉其茸亦可用論雞舌香豫集靈苑方論雞舌香以為丁香母蓋出陳氏拾遺今細考之尚為未然按齊民要術雞舌香以其似丁子故一名丁子香即今丁香是也日華子云雞舌香治口氣所以三省故事郎官含雞舌香欲其奏事對答氣芬芳此正謂丁香治口氣至今方書為然又古方五香連翹湯用雞舌香千金五香連翹湯無雞舌香卻有丁香此最為明驗新補本草又出丁香一條蓋不曾深考也今世所謂雞舌香者乳香中得之大如山茱萸剖開中如柿核略無氣味以此治疾殊極乖謬論金罌子金罌子止遺泄取其溫且澀也世之用金罌者待其紅熟時取汁熬膏用之大誤也紅則味甘熬膏則全斷澀味都失本性今當取半黃時採干搗末用之論地骨皮枸杞陝西極邊生者高丈餘大可作柱葉長數寸無刺根皮如厚朴甘美異於他處者千金翼云甘州者為真葉厚大者是大體出河西諸郡其次江地閒墟埂上者實圓如櫻桃全少核曝乾如餅極膏潤有味論淡竹淡竹對苦竹為文除苦竹外悉謂之淡竹不應別有一品謂之淡竹後人不曉於本草別疏淡竹為一物今南人食筍有苦筍有淡筍兩色淡筍淡竹也論細辛東南方所用皆杜衡也又謂之馬蹄香色黃白拳局而脆干則圓非細辛也細辛出華山極細而直深紫色味極辛嚼之習習如生椒其辛更甚於椒故本草云細辛水漬令直是以杜衡僞之也襄漢間又有一種細辛極細而直色黃白乃是鬼督郵非細辛也論甘草本草注引爾雅云蘦大苦注甘草也蔓延生葉似荷莖青赤此乃黃藥也其味極苦故謂之大苦非甘草也甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛實作角生如相思角四五角作一本生熟則角折子如小扁豆極堅齒齧不破論胡麻胡麻直是今油麻更無他說豫已於靈苑方論之其角有六稜者有八稜者中國謂之麻今謂之大麻是也有實為苴麻無實為枲麻又曰牡麻張騫始自大宛得麻之種亦謂之麻故以胡麻別之不謂漢麻為大麻也論赤箭赤箭即今天麻也後人既誤出天麻條遂指赤箭別為一物既無此物乃取天麻苗為之滋為不然本草明稱採根陰乾安得以苗為根草藥上品除五芝之外赤箭為第一此神仙補理養生上藥世人惑於天麻之說遂止用之治風良可惜哉或以謂其莖如箭既言赤箭疑當用莖此猶不然至如鳶尾牛膝之類皆謂莖葉有所似用則用根爾何足疑哉論地菘地菘即天名精也世人既不識天名精又妄認地菘為火蘞本草又出鶴蝨一條都成紛亂今按地菘即天名精也其葉似松又似蔓荊名精即蔓荊也故有二名鶴蝨即其實也世間有單服火蘞法乃是服地菘爾不當服火蘞火蘞本草名𦻎蘞即是豬膏莓後人不識亦云復出之爾論南燭草木南燭草木記傳本草所說多端今少有識者為其作青精飯色黑乃誤用烏臼為之全非也此木類也又似草類故謂之南燭草木今人謂之南天燭者是也南人多種於庭檻之間莖如蒴藋有節高三四尺廬山有盈丈者葉微似楝而小至秋則實赤如丹南方至多論太陰元精太陰元精生解州鹽澤大滷中溝渠土內得之大者如杏葉小者如魚鱗悉皆六角端正似刻正如龜甲其裙袖小墮其前則下剡其後則上剡正如穿山甲相掩之處全是龜甲更無異也色緑而瑩徹叩之則直理而析瑩明如鑑析處亦六角如柳葉火燒過則悉解析薄如柳葉片片相離白如雪平潔可愛此乃稟積陰之氣凝結故皆六角今天下所用元精乃絳州山中所出絳石爾非元精也楚州鹽城縣古鹽倉下土中又有一物六稜如馬牙硝清瑩如水晶潤澤可愛彼方亦名太陰元精然喜暴潤如鹽滷之類惟解州出者為正論稷米稷乃今之穄也齊晉之人謂稷皆曰祭是其土音無他義也本草注云又名糜子糜子乃黍屬詩云維秬維秠維糜維芑秬秠糜芑皆黍屬以色為別丹黍謂之糜糜音門今河西人用糜字音縻論苦耽苦耽即本草酸漿也新集本草又重出苦耽一條河西番界中酸漿有盈丈者論蘇合香今之蘇合香如堅木赤色又有蘇合油如𥻿膠今多用之為蘇合香按劉夢得傳信方用蘇合香多薄葉子如金色按之則少放之則起良久不定如蟲動氣烈者佳也如此則全非今所用者更當精考之論薰陸香薰陸即乳香也本名薰陸以其滴下如乳頭者謂之乳頭香熔塌在地上者謂之塌香如蠟茶之有滴乳白乳之品豈可各是一物論山豆根山豆根極苦本草言味甘者大誤也論青蒿蒿之類至多如青蒿一類自有兩種有黃色者有青色者本草謂之青蒿亦恐有別也陝西綏銀之間有青蒿叢或間有一兩株迥然青色土人謂之香蒿莖葉與常蒿悉同但常蒿色緑而此蒿色青翠一如松檜之色至深秋余蒿並黃此蒿尤青氣頗芬芳恐古人所用以此為勝論文蛤海蛤魁蛤按文蛤即吳人所食花蛤也魁蛤即車螯也海蛤今不識其生時但海岸泥沙中得之大者如棋子細者如油麻粒或黃或赤相雜蓋非一類乃諸蛤之房為海水礲礪光瑩都非舊質蛤之屬其類至多房之堅久瑩潔者皆可用不必指一物故通謂之海蛤耳論漏蘆今方家所用漏蘆乃飛廉也飛廉一名漏蘆苗似苦芙根似牛蒡綿頭者是也採時用根今閩中所用漏蘆莖如油麻高六七寸秋深枯黑如漆時用苗本草自有一條正謂之漏蘆論赭魁本草所謂赭魁皆未詳審今赭魁南中極多膚黑肌赤似何首烏切破其中赤白理如檳榔有赤汁如赭南人以染皮製靴閩嶺人謂之餘糧本草禹餘糧注中所引乃此物也論龍芮石龍芮今有兩種水生者葉光而末圓地生者其葉毛而末鋭入藥用水生者陸生者亦謂之天灸取少葉揉臂上一夜作大泡如火燒是也論麻子麻子海東來者最大如蓮實出柘蘿島其次上郡北地所出大如大豆亦善其餘皆下材用時去殼其法取麻子帛包沸湯中浸候湯冷乃取懸井中勿令著水明日日中曝乾就新瓦上輕挼其殼悉解簸揚取肉粒粒皆完灸二十二種骨蒸法崔丞相灸勞法外臺祕要崔相家傳方及王寶臣經驗方悉編載然皆差誤毗陵郡有石刻最詳余取諸本參校成此一書比古方極為委曲依此治人未嘗不驗往一灸而愈豫在宜城久病虛羸用此而愈唐中書侍郎崔知悌序夫含靈受氣稟之於五行攝生乖理降之以六疾若歧黃廣記蔚有舊經攻灸兼行顯著斯術骨蒸病者亦名傳尸亦謂殜殗亦稱復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問長少多染此病嬰孺之流傳注更苦其為狀也發乾而聳或聚或分或腹中有塊或腦後兩邊有小結多者乃至五六或夜臥盜汗夢與鬼交雖目視分明而四肢無力且上氣食少漸就沉羸縱延日時終於𣩄盡余昔忝洛州司馬嘗三十日灸活一十三人前後瘥者數逾二百至於貍骨獺肝徒聞曩說金牙銅鼻罕見其能未若此方扶危拯急非止單攻骨蒸又別療氣療風或瘴或勞或邪或癖或患狀既廣灸活者不可具述略陳梗概又恐傳受訛謬以誤將來今故具圖形狀庶令覽者易悉使所在流布頗用家藏未暇外請名醫傍求上藥還魂返魄何難之有遇斯疾可不務乎取穴法先定穴令患人平身立正取一細繩擸之勿令展縮順腳底貼肉堅踏之男左女右其繩前頭與大拇指端齊後頭令當腳根中心向後引繩循腳肚貼肉直上至曲䐐中大橫紋截斷又令患人解發分兩邊令見頭縫自囟門平分至腦後乃平身正坐取向所截繩一頭令與鼻端齊引繩向上正循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以墨點記之墨點不是灸處又取一繩子令患人合口將繩子按於口上兩頭至吻卻拘起繩子中心至鼻柱根下止如此便齊兩吻截斷將此繩展令直於前來脊骨上墨點處橫量取平勿令高下繩子先中折當中以墨記之卻展開繩子橫量以繩子上墨點正壓脊骨上墨點為正兩頭取中勿令高下於繩子兩頭以白圈記白圈是灸穴也以上是第一次點二穴次二穴令其人平身正坐稍縮臂膊取一繩繞項向前雙垂與鳩尾齊鳩尾是心岐骨人有無心岐骨者至從胸前兩岐頭下量取一寸即是鳩尾也即雙截斷卻背翻繩頭向項後以繩子中停取心正令當喉嚨結骨上其繩兩頭夾項雙垂循脊骨以墨點記之墨點不是灸處又取一繩子令其人合口橫量齊兩吻截斷還於脊骨上墨點橫量如法繩子兩頭以白圈記之白圈是灸穴處以上是第二次點穴通前共四穴同時灸日別各七壯至第二穴壯纍灸至一百或一百五十壯為妙候灸瘡欲瘥又依後法灸二穴又次二穴以第二次量口吻繩子於第二次雙繩頭盡處墨點上當脊骨直上下豎點令繩中停中心在墨點上於上下繩盡頭以白圈兩穴白圈是灸穴處以上是第三次點兩穴謂之四花穴灸兩穴各百壯三次共六穴各取離日量度度訖即下火唯須三月三日艾最佳病瘥百日內忌飲食房室安心靜處將息若一月後覺未瘥復初穴上再灸凡骨蒸候所起辨驗有二十二種並依上項灸之一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩熱悶四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸發焦八脈蒸急緩不調九肝蒸或時眼前昏暗十心蒸舌焦或瘡或時胸滿十一脾蒸唇焦坼或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸蒸下瀝不禁十八大腸蒸右鼻孔痛十九二焦蒸乍寒乍熱二十肉蒸別人覺熱自覺冷寒二十一皮蒸皮生粟起二十二氣蒸遍身壯熱不自安息用尺寸取穴法凡孔穴尺寸皆隨人身形大小須男左女右量手指中一節兩橫紋中心為一寸中艾炷大小法凡艾炷須令腳跟足三分若不足三分恐覆孔穴不備穴中經脈火氣不行即不能抽邪氣引正氣雖小兒必以中指取穴為準取艾法端午日日未出於艾中以意求其似人者輒拮之以灸殊有效幼時見一書云爾忘其為何書也艾未有真似人者於明暗間苟以意命之而已萬法皆妄無一真者此何疑耶用火法黃帝曰松柏柿桑棗榆柳竹等依火用灸必害肌血慎不可用凡取火者宜敲石取火或水晶鏡子於日得者太陽火為妙天陰則以槐木取火亦良灸後宜服治勞地黃丸具方生地黃汁青蒿汁薄荷汁童便好酒以上各二升煎成膏入柴胡去頭鱉甲醋炙秦艽各一兩硃砂麝香各半兩研上五味為末入前膏和為丸如桐子大每服十五丸至二十丸溫酒下切忌生冷毒物
