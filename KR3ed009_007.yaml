body:
  text: 卷第七治眼齒前日與歐陽叔弼晁無咎張文潛同在戒壇余病目昏數以熱水洗之文潛目日忌點洗目有病當存之齒有病當勞之不可同也治目當如治民治齒當如治軍治民當如曹參之治齊治軍當如商鞅之治秦頗有理當追錄之治內瘴眼本草云熟地黃麥門冬車前子相得治久患內瘴眼有效屢試之信然其法細搗羅蜜丸如梧桐子大每服溫酒熟水任下然三藥皆潤難搗旋焙旋搗和合異常甘香真奇藥也還睛神明酒沈存中撰黃連五兩石決明草決明生薑石膏蕤仁黃硝石山茱萸當歸黃芩沙參車前子淡竹葉朴硝甘草芍藥柏子仁川烏頭澤瀉桂心薺子地膚子桃仁去皮尖雙仁者防風辛夷人參川芎白芷細辛瞿麥以上各三兩龍腦三錢丁香半兩珠子生二十五顆秦皮三兩上㕮咀絹囊盛用好酒五斗甕中浸之春秋十四日夏七日冬二十一日食後服半合勿使醉吐稍稍增之百日後目明如舊忌熱面鮓葵穢臭五辛雞魚豬馬驢肉生冷黏滑人房恚怒大憂愁大勞大寒熱悉慎之惟不療枯睛損破者但白睛不枯損服此藥更生瞳子平復如故出五符漢司空倉元明兩目盲經十五年兩瞳子俱損翳如雲赤白膚如乳頭服此酒未滿百日兩目還得清淨夜任針勝如未患眼時十倍晉大夫於公失明經二十餘年不辨明夜兩目俱損無瞳子時年七十服此酒百日萬病除兩目明見物益明表親有病目者服此酒十餘日翳皆消盡治諸目疾上盛熱湯滿器銅器尤佳以手掬熨眼眼緊閉勿開亦勿以手揉眼但掬湯沃湯冷即已若有疾一日可三四為之無疾一日兩次沃令眼明此最治赤眼及瞼眥癢予自十八歲因夜書小字病目楚痛凡三十年用此醫法遂永瘥樞密邵興宗目昏用此法逾年後遂能燈下觀細字大率血得溫則榮目全要血養若衝風胃冷歸即沃之極有益於目點眼熊膽膏古錢二十一枚完用菊花一兩黃連鬱金黃柏各二兩以上菊花揉碎黃連以下三物細銼用水二升銀石器中慢火熬至一升新布濾去滓入後藥鉛丹元青石井泉石龍骨不灰木蕪荑去皮蕤仁去殼代赭各半兩滑石烏鰂魚骨去堅處各一兩以上細研成膏粉入蜜六兩並前藥汁和勻銀器內重湯煮六時辰再以新綿絞濾去相入後藥硼砂麒麟竭沒藥青鹽銅青各半兩川牙硝一兩乳香一分麝香龍腦水銀粉二錢熊膽半個雄雀糞七粒硇砂一錢五分上並細研羅過再研如面入前膏內再用重湯煮如稀餳如要為丸即更熬可丸即丸如梧桐子大每用一丸水化並以銅箸點兩眥此本舒州甘露山儼長老方治目疾殊聖久患瘀肉瞼爛諸疾點此無不瘥者暴目赤風癢只點三兩次即瘥有人瘀肉滿眼用此亦消盡清明如未病時熬藥須用銀器皆用上品藥洗濯揀擇極細方有效靈苑治眼苘實散苘麻子以柳木製磑子磨之馬尾篩篩過取黃肉其烏殼棄不用每十兩可得四兩精肉非柳木磑不能去殼碾為末取獖豬肝薄切裛藥中令相著乃緩火炙肝熟為末臨臥陳米飲調下二錢一法煎釅醋為丸每服二十丸一法取苘實內囊蒸一炊曝乾為末或散或蜜丸溫水下予親家女子兒童時病翳一目中五翳病十五年治之莫愈醫者皆以不可療之試用炙肝散十許日一翳消逾月消盡目如為兒時貍鳩丸治內瘴青盲翳暈及時暫昏暗一切眼疾花鳩一隻去毛腸嘴足炙熟羊肝一具炒細辛防風肉桂黃連牡蠣甘菊花白蒺藜各五兩白茯苓瞿麥各四兩羌活三兩蔓荊子二升蒸三炊蕤仁半升決明二合上煉蜜丸如梧桐子大每服二十至三十丸空心日午臨臥茶酒下半月見效忌房事五辛蒜雞魚豬楚醫陳中立雙盲數年服此視物依舊偏頭痛方裕陵傳王荊公偏頭痛方云是禁中秘方用生蘿菔汁一蜆殼仰臥注鼻中左痛注右右痛注左或兩鼻皆注亦可數十年患皆一注而愈荊公與僕言已愈數人頭痛硫黃丸硫黃二兩細研硝石一兩上水丸指頭大空心臘茶嚼下予中表兄病頭風二十餘年每發頭痛如破數日不食百方不能療醫田滋見之曰老母病此數十年得一藥遂效就求得之十丸日服一丸十餘日後滋復來云頭痛平日食何物即發答云最苦飲酒食魚滋取魚酒令恣食云服此藥十枚豈復有頭痛即如其言食之竟不發自此遂瘥予與滋相識數歲臨別以此方見遺陳州懷醫有此藥丸如梧桐子大每服十五丸暑暍懵冒者冰冷水服下咽即豁然清爽傷冷以沸艾湯下治氣攻頭痛葫蘆巴散胡蘆巴微炒三稜銼醋浸一宿炒乾各一兩乾薑一分炮上為末每服二錢溫生薑湯或酒調下凡氣攻頭痛一服即瘥萬法不愈頭痛如破者服之即愈尤利婦人姻家有病瘧瘥後頭痛號呼十餘日百方不效用一服如失小小頭痛更捷治鼻衄方取河陽石炭心如無只用光明者為末新水下立止又治鼻左衄用編塞右耳右衄塞左耳神應予自曾用治鼻衄不可止欲絕者用茅花無以根代每服一大把銼水二碗煎濃汁一碗分二服林次中御史在楚州嘗訪一故人久之不出或問之云子婦衄血垂盡方救視未延客坐中一客云適有藥急令掇茅花一大把煎濃汁一碗帶囊中取一小紅丸二粒令茅花湯吞下一服即瘥問其方不言後有人曰此止是茅花之功耳試復問之其人大笑曰誠如此紅丸乃含香硃砂丸恐不信茅花之功以此為記耳予在鄜延一將官率病衄甚困以此療之即瘥也又徐德佔教衄者急灸項後髮際兩筋間宛穴中三壯立定蓋血自此入腦注鼻中常人以線勒頭後尚可止衄此灸決效無疑治鼻衄刺薊散大薊根一兩相思子半兩上每服一錢水一盞煎七分去滓放冷服王朝散女子大衄一日已惛不識人舉家發哭用藥皆無效人有傳此方一服乃止治熱吐槐花散皂角去皮燒煙絕白礬熬沸定槐花炒黃黑色甘草炙以上各等分上為末每服二錢白湯調下嘉興李使君曾病嘔每食訖輒吐如此兩月服反胃藥愈甚或謂有痰飲投半夏旋服之亦皆不驗幕下樂判官授此方服之即時瘥又有一老青衣病嘔與服之又瘥大凡吐多是膈熱熱且生痰此藥能化胃膈熱涎有殊效治吐紫粉丸針砂醋浸一宿闢去醋便帶醋炒候炒至銚子紅色無煙乃止候冷細研更用醋團火燒洞赤取起候冷再研極細糊丸如梧桐子大每服四十丸粥飲下服訖更啜一盞許粥已不吐如未定再服決定小兒小丸之隨兒大小與此藥極神異吐有多端良方中有數法皆累驗者可參用之止吐軟紅丸辰砂五錢信砒半錢強巴豆七個取霜胭脂一錢上熔蠟少許入油一二滴和藥為劑以油單裹之大人如綠豆小兒如芥子濃煎槐花甘草湯放溫下一丸忌熱食半時久此藥療人吐只一服常與人一丸偶兩人病分與兩人服兩人皆止酒磨丸治吐逆粥藥不下者五靈脂狗膽汁和丸如雞頭大每服一丸煎熱生薑酒磨化再湯蒸令極熱先煮溫粥半升持在手令病人乘藥熱頓飲便以粥送下治口瘡綠雲膏黃柏半兩螺子黛二錢上同研如碧玉色臨臥置舌根下一字咽津無妨遲明瘥凡口瘡不可失睡一夜失睡口瘡頓增灸牙疼法隨左右所患肩尖微近後骨縫中小舉臂取之當骨解陷中灸五壯予目睹灸數人皆愈灸畢項大痛良久乃定永不發予親病齒百方治之皆不驗用此法灸遂瘥服松脂法烏髭脂以真定者為良細布袋盛清水百沸湯煮浮水面者以新竹罩籬掠取投新水中久煮不出者皆棄不用入生白茯苓末不制但削去皮搗羅細末爾拌勻每日早取三錢匕著口中用少熟水攪嗽仍以指如常法熟揩齒畢更以熟水咽之仍以嗽吐如常法能牢牙駐顏烏髭也贈米元章
