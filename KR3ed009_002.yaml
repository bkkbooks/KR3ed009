body:
  text: 卷第二論風病王遊元龍言錢子飛治大風方極驗嘗以施人一日夢人自云天使以此病人君違天怒若施不已君當得此病藥不能救子飛懼遂不施僕以為天之所病不可療耶則藥不應服有效藥有效者則是天不能病當是病之祟畏是藥而假天以禁人爾晉侯之病為二豎子飛赤丸亦先見於夢蓋有或使之者子飛不察為鬼所脅若豫則不然苟病者得愈願代其苦家有此方能下腹中穢惡在黃州試之病良已後當常以施人治風氣四神丹熟乾地黃元參當歸羌活各等分上搗為末蜜和丸梧桐子大空心酒服丸數隨宜列仙傳有山圖者入山採藥折足仙人教服此四物而愈因久服遂度世頃余以問名醫康師孟師孟大異之云醫家用此多矣然未有專用此四物如此方者師孟遂名之曰四神丹洛下公卿士庶爭餌之百病皆愈藥性中和可常服大略補虛益血治風氣亦可名草還丹己卯十一月東坡居士儋耳書四味天麻煎方世傳四味五兩天麻煎方蓋古方本以四時加減但傳藥料耳春肝旺多風故倍天麻夏伏陰故倍烏頭秋多利下故倍地榆冬伏陽故倍元參當去皮生用治之方搗烏頭無復毒此常服不獨去病乃保真延年與仲景八味丸並驅矣木香散治偏風癱瘓腳氣等疾羌活一兩麻黃去節水煮少時去沫二兩防風三分木香檳榔附子炮去皮白朮川烏頭炮去皮草豆蔻和皮用陳橘皮牛膝酒浸一宿杏仁生去皮尖當歸酒浸一宿人參茯苓甘草炙川芎官桂不得見火各半兩上十八味銼如麻豆每服一兩水一碗姜七片煎至一盞去滓得七分溫服大腸不通加大黃末每服一錢以老少加減如久不通加至三五錢不害心腹脹加葶藶並滑石末每服各一錢滑石湯送下如上膈壅滯痰嗽氣急加半夏升麻天門冬知母末各二錢同煎其藥滓兩合為一服用水一碗半煎至一盞服此藥福唐陳氏者鬻以自給郡人極神之人未有得其方者一日為其親戚攘得與豫豫作官處即合以施人如法煮服以衣覆取汙不過三五服輒瘥所至人來求藥者無窮其驗如神左經丸治筋骨諸疾手足不隨不能行步運動草烏肉白者生去皮臍木鱉子去殼別研白膠香五靈脂各三兩半當歸一兩斑蝥一百個去翅足少醋煮熟上為末用黑豆去皮生杵粉一斤醋煮糊為丸如雞實大每服一丸酒磨下筋骨疾但不曾針灸傷筋絡者四五丸必效豫鄰里胡生者一女子腕軟不能行立已數年生因遊淨因佛寺與僧言有一僧云能治出囊中丸十枚以四枚與生曰服此可瘥生如其言與服女子遂能立生再求藥於院僧曰非有愛也欲留以自備必欲之須合一料生與錢一千辭不受止留百錢後數日得藥並餘錢悉歸之同院僧佐其理藥乃剽得此方豫至嘉興有一里巷兒年十餘歲兩足不能行以一丸分三服服之盡四五丸遂能行自此大為人所知其效甚著此藥能通營衛導經絡專治心腎肝三經服後小便少淋瀝乃其驗也燒肝散治三十六種風二十四般冷五勞七傷一切痢疾脾胃久虛不思飲食四肢無力起止甚難小便赤澀纍年口瘡久醫不瘥但依此法服之必愈茵陳犀角石斛柴胡芍藥白朮以上各半兩乾薑防風桔梗紫參人參胡椒官桂去皮白蕪荑吳茱萸以上各一兩上共十五味同為末以羊肝一具如無即獖豬肝代之分作三分淨去血脈脂膜細切用末五錢蔥白一莖細切相和以濕紙三五重裹之掘地坑內以火燒令香熟早晨生薑湯嚼下大假冷勞不過三服見效廬州刁參軍病泄痢日久黑瘦如墨萬法不瘥服此一二服下墨汁遂安蛜𧌴丸治鶴膝風及腰膝風縮蛜𧌴頭尾全者桃仁生白附子阿魏桂心白芷安息香用胡桃穰研各一兩沒藥三分以前八物用童便五升無灰酒二升銀器內熬令厚乳香三分當歸北漏蘆牛膝芍藥地骨皮去土威靈仙羌活各一兩上為丸如彈丸大空心暖酒化下一丸胡楚望博士病風疰手足指節皆如桃李痛不可忍服悉愈烏荊丸治風川烏一兩炮去皮荊芥穗一兩上醋糊丸如桐子大每服二十丸酒或熟水下有疾食空時日三四服無疾早晨一服少府郭監丞少病風搴搐頤頷寬嚲不收手承頷然後能食服此六七服即瘥遂長服之已五十餘年年七十餘強健鬚髮無白者此藥療腸風下血尤妙纍有人得效豫所目見下血人服此而瘥者一歲之內已數人天麻煎丸治風氣不順骨痛或生赤點隱疹日久不治則加冷痹筋骨緩弱沉香天麻煎丸出博濟五靈脂附子白朮赤小豆各一兩天麻半兩乾蠍炒羌活防風各一兩上先以沉香二兩酒一升煎為膏無犯鐵器入藥搗千下為丸梧桐子大空腹荊芥湯或荊芥酒下二十丸過五日加至三十丸秋夏宜荊芥湯春冬宜荊芥酒春末夏初喜生赤根白頭瘡服之瘥服威靈仙法服威靈仙有二法別有一帖云以甚威靈仙雜牛膝服之視氣虛實加減牛膝牛膝以酒浸焙乾二物皆為末丸散皆可丸以酒煮麵糊其一淨洗陰乾搗羅為末雜酒浸牛膝末或蜜丸或為散酒調牛膝之多少視已氣之虛實而增減之此眉山一親患腳氣至重依此服半年遂永除其一法取藥粗細得中寸截之七寸作一帖每歲作三百六十帖置床頭五更初面東細嚼一帖候津液滿口咽下此牢山一僧年百餘歲上下山如飛云得此藥方二法皆以得真為要真者有五驗一味極苦二色深黑三折之脆而不韌四折之微塵如胡黃連狀五斷處有黑白暈謂之鴝鵒眼無此五驗則藁本根之細者耳又須忌茶別有一帖云但忌茶常服此藥以皂角槐芽為茶取極嫩者湯中略煮一沸但取出布裹壓干入焙以軟熟火焙乾取飲茶無異以槐芽皂角至嫩者依造草茶作或取外臺祕要代茶飲子方常合服乃可煮肝散治肝痿腳弱及傷寒手足干小不隨紫菀桔梗蒼朮芍藥各等分上末每服四錢羊肝半具大竹刀切勿犯水勿令血散入鹽醋蔥姜酒同煮熟空腹食前日三服谷熟尉宋鈞傷寒病瘥後雙足但有骨不能立服此見其肉生一兩月間乃復如舊烏頭煎丸治風毒氣攻眼久成內外瘴痛楚胬肉赤脈等病十年者皆可療黑豆二兩小者川烏頭一兩去皮青橘皮半兩去白同烏頭黑豆為末以水一升三合浸一宿緩火煎成膏子甘菊花一兩牛膝枸杞川芎荊芥穗羌活地龍去土白蒺藜去角當歸干薄荷各半兩上將前青皮為丸如桐子大每服二十丸空心茶酒任下蜜湯亦得先君因失少女感傷哭泣忽目瞑不見物治之逾月復明因盛怒呵一罪人目復瞑逾年得此服不盡一劑目復如故羌活防風酒浸一宿黃耆木賊附子炮蟬殼甘草蛇蛻一條青竹炙荊芥穗甘菊花白蒺藜去角旋覆花石決明泥裹燒通赤另研上等分除附子蛇蛻決明皆銼碎新瓦上烙令燥為散每二錢第二米泔煎熟調下空心日午夜臥各一服豫少感目疾逾年人有以此方見遺未暇為之有中表兄許復常苦目昏後已都瘥問其所以瘥之由云服此藥遂合服未盡一劑而瘥自是與人莫不驗通關散治諸中風傷寒旌德烏頭四兩破皮旌德有蘆頭肌白者藁本防風當歸白芷天南星川芎乾薑雄黃細研桂以上各半兩並生勿近火上為末煨蔥酒下一字或半錢癱瘓加牛黃麝香小兒減半薄荷酒下此散豫目見醫數人今聊記其一二曾在江南見市門有臥者問之乃客販因病偏風醫之遂至病困為邸家所委時伯氏為邑使人舁到令舍調藥飲之又與十服數日伯氏出市有一人扶倚床而呼曰昔日臥者今能扶榻而行矣藥盡願少繼之伯氏又與十服服訖能起又一吏病瘡而攣逾歲月臥矣伯氏與散二錢匕為八服吏謬以為一服服已僵眩嘔吐幾困將殆數日瘡攣悉除大瘥中風攣弛治之須先去痰去已乃用續命湯輩汗之未乃用此為宜蓋風病多挾熱若未發散便投烏頭輩或不相當也更消息治之必驗辰砂散治風邪諸癇狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫戴目魂魄不守醫禁無驗辰砂一兩須光明有牆壁者酸棗仁微炒乳香光瑩者各半兩上量所患人飲酒幾何先令恣飲沉醉但勿令至吐靜室中服藥訖便安置床枕令睡以前藥都為一服溫酒一盞調之頓服令盡如素飲酒少人但隨量取醉病淺入一兩日深者三五日睡不覺令家人潛伺之覺即神魂定矣慎不可驚觸使覺及他物驚動一為驚寤更不可治上樞正肅吳公少時病心服一劑三日方寤遂瘥治諸風上攻頭痛方地龍穀精草為末同乳香火餅上燃以紙筒籠煙鼻聞之即瘥側子散治筋脈抽掣疼痛不止側子炮裂去皮臍赤箭漏蘆芎藭酸棗仁微炒海桐皮各一兩桂心五加皮仙靈脾牛膝木香各三五錢枳殼麩皮炒去瓠半兩上為末每服一錢溫酒調下不計時候服此藥尤治目赤痛屢用每驗蓋攻治肝風凡目赤皆主於風豫於四生散論之甚詳此方主療亦四生散之類也四生散治腎臟風治眼治癬白附子下注腳生瘡用黑附子腎形沙苑蒺藜羌活黃耆上等分皆生為末每服二錢鹽酒調下空腹豬腎中煨服尤善豫為河北察訪使時病赤目四十餘日黑睛旁黯赤成瘡晝夜痛楚百療不瘥郎官邱革相見問豫病目如此曾耳中癢否若耳中癢即是腎家風有四生散療腎風每作二三服即瘥閭里號為聖散子豫傳其方合服之午時一服臨臥一服目反大痛至二鼓時乃能眠及覺目赤稍散不復痛矣更進三四服遂平安如常是時孫和甫學士帥鎮陽聞豫說大喜曰吾知所以自治目矣向久病目嘗見呂吉甫參政云頃目病久不瘥因服透水丹乃瘥如其言修合透水丹一劑試服了二三十服目遂愈乃知透水丹亦療腎風耳此可記爾恫目人更當記一事豫在河北病目時曾治浴具洛州守閭君綬見訪云目赤不可浴將軀體中熱並集頭目目必甚又轉運判官李長卿亦云然豫不信卒浴浴畢目赤遂大作行數程到巨鹿陳彥升學士以病目廢於家問其目病之因云頃年病目赤飲酒歸過同舍林億邀同太學浴彥升舊知赤目不可浴堅拒之不得僶俯一浴浴已幾失明後治之十餘年竟不瘥此亦以為戒也又豫之門人徐某構病癬久不瘥服四生散數日都除
