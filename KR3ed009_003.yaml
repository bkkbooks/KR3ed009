body:
  text: 卷第三論聖散子昔豫覽千金方三建散云於病無所不治而孫思邈特為著論以謂此方用藥節度不近人情至於救急其驗特異乃知神物用靈不拘常制至理開惑智不能知今豫得聖散子殆此類也自古論傷寒為急表裡虛實日數證候應汗應下之類差之毫釐輒至不救而用聖散子者一切不問陰陽二感或男子女人相易狀至危篤速飲數劑而汗出氣通飲食漸進神宇完復更不用諸藥連服取瘥其餘輕者心額微汗正爾無恙藥性小熱而陽毒發狂之類入口便覺清涼此藥殆不以常理而詰也若時疾流行不問老少良賤平旦輒煮一釜各飲一盞則時氣不入平居無事空腹一服則飲食快美百疾不生真濟世衛家之寶也其方不知所從出而故人巢君谷世寶之以治此疾百不失一既得之謫居黃州連歲大疫所全活者不可勝數巢甚祕之此方指松江水為誓盟不得傳人豫竊隘之以傳蘄水龐君安時龐以醫聞於世又善著書故以授之且使巢君名與此方同不朽也聖散子啓聖散子主疾功效非一去年春杭州民病得此藥全活不可勝數所用皆中下品藥略計每千錢即得千服所濟已及千人由此積之其利甚薄凡人欲施惠而力能自辦者猶有所止若合衆力則人有善利其行可久今募信士就楞嚴院修制自立春後起施至來年春夏之交有入名者徑以施送本院昔薄拘羅尊者以訶黎勒施一病比邱故獲報身常無衆疾施無多寡隨力助緣疾病必相扶持功德豈有限量仁者惻隱當崇善因吳郡陸廣秀才施此方並藥得之於智藏主禪月大師寶擇乃鄉僧也其陸廣見在京施方並蕊在麥牟巷住出此方聖散子方草豆蔻去皮面裹炮十個木豬苓去皮石菖蒲高良薑獨活去蘆頭附子炮製去皮臍麻黃去根厚朴去皮薑汁炙藁本去穰土炒芍藥枳殼去穰麩炒柴胡澤瀉白朮細辛防風去蘆頭藿香半夏薑汁製各半兩甘草一兩炙茯苓半兩上銼碎如麻豆大每服五錢匕水一鍾半煮取八分去滓熱服余滓兩服合為一服重煎空心服解傷寒小柴胡湯柴胡二兩黃芩人參甘草炙生薑各三分半夏湯洗一兩半大棗十二枚破上銼如麻豆大以水三升煮取一升半去滓再煎取九合溫服三合日三服此古法也今可作粗散每服三錢棗三枚薑五片水一盞半煎至八分溫服氣實疾勢盛者加至四五錢不妨並去滓此張仲景方豫以今稱量改其分劑孫兆更名黃龍湯近歲此藥大行患傷寒不問陰陽表裡皆令服之此甚誤也此藥傷寒論雖主數十證大要其間有五證最的當服之必愈一者身熱心中逆或嘔吐者可服傷寒此證最多正當服小柴胡湯若因渴飲水而嘔者不可服身體不溫熱者不可服仍當識此二者寒者寒熱往來者可服三者發潮熱可服四者心煩脅下滿或渴或不渴皆可服五者傷寒已瘥後更發熱者可服此五證但有一證更勿疑便可服服之必瘥若有三兩證以上更的當也其餘證候須仔細詳方論及脈候相當方可用不可一概輕用世人但知小柴胡治傷寒不問何證便服之不徒無效兼有所害緣此藥差寒故也唯此五證的不蹉跌決效無疑此傷寒中最要藥也家家有本但恐用之不審詳今備論於此使人瞭然易曉本方更有加減法雖不在此五證內用之亦屬效今亦載於此若胸中煩而不嘔去半夏加人參合前成一兩栝蔞根一兩若腹中痛者去黃芩加芍藥三分此一證最有驗常時腹痛亦療若脅下痞硬去大棗加牡蠣一兩若心下悸小便不利去黃芩加茯苓一兩若不渴外有微熱者去人參加桂三分溫覆微汗愈若咳去人參大棗生薑加五味子半兩乾薑半兩元祐二年時行無少長皆咳服此皆愈常時止壅痰實只依本方食後臥時服甚妙赤白痢尤效痢藥中無如此妙蓋痢多因伏暑此藥極解暑毒凡傷暑之人審是暑暍不問是何候狀連進數服即解麻黃丸兼治破傷風及一切風治傷寒解表止頭痛麻黃六兩去節沸湯炮去黃水焙乾烏頭水浸三日頻換水去皮日乾炮去臍天南星別搗甘草一兩炙麝香一分半夏湯洗七遍石膏泥裹火燒通赤研以上各四兩白芷三兩龍腦半兩隻用樟木龍腦但要發散不用南番龍腦上為末水煮天南星為丸如小彈子大每服一丸蔥茶或酒嚼下薄荷茶亦得連二三服此本豫家白龍丸已編入靈苑後又加麻黃作六兩寒水石石膏為衣治傷寒至佳小小傷風服之立瘥解表藥中此尤神速治暑暍逡巡悶絶不救者道上熱土大蒜上略等多少爛研冷水和去滓飲之即瘥此方在徐州沛縣城門上板書搗之不知何人所施也治暑傷肌膚多瘡爛或因搔成瘡者林才中嘗暑中臥病肌膚多瘡爛汁出有一乳姥曰此易瘥取干壁土揉細末敷之隨手即瘥治瘴木香丸雞心檳榔陳橘皮去白各二兩青木香人參厚朴官桂去無味者大附子羌活京三稜獨活乾薑炮甘草炙芎藭川大黃切微炒芍藥各五錢牽牛子一斤淘去浮者揩拭乾熱搗取末四兩餘滓不用肉豆蔻六枚去殼止瀉方用上十五味為末瓷器盛之密封臨服用牽牛末二兩藥末一兩同研令勻蜜丸如桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒腳氣目昏頭痛心間嘔逆及兩脅堅滿不消臥時橘皮湯下三十丸以利為度此後每夜二十丸女人血痢下血刺痛積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每夜更服二十丸小兒五歲以上疳氣腹脹氣喘空心溫湯下五七丸小者減丸數服凡胸腹飽悶不消脾泄不止臨臥溫酒下取利食毒癰疽發背山嵐瘴氣才覺頭痛背膊拘緊便宜服之快利為度嘗服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以涼藥解膈上壅熱並以此藥通利彌善此丸本治嵐瘴及溫瘧大效李校理敦裕常為傳刻石於大庾嶺蒙效者不可勝數子伯氏任閩中常擁兵捕山寇過漳浦軍人皆感瘧用此治之應時患愈豫在江南時值歲發瘧以此藥濟人其效如神皆以得快利為度又記凡久瘧服藥訖乃灸氣海百壯又灸中脘三十壯尤善枳殼湯治傷寒痞氣胸滿欲死桔梗枳殼炙去穰各一兩上銼如米豆大用水一升半煎減半去滓分二服傷寒下早則氣上膨胸世俗即謂之結胸多更用巴豆粉霜膩粉下之下之十有八七死此蓋瀉其下焦下焦虛則氣愈上攻胸膈多致不救凡胸脹病只可瀉膈若按之堅硬而痛此是結胸胸有水須用大黃甘遂輩下之陷胸丸之類是也若按之不甚硬亦不痛此名痞氣上虛氣熱鼓脹只可用黃芩黃連大黃之類化之嘗有人患胸脹已危困作結胸痞氣皆不瘥文大夫以此湯飲之下黃水一升許遂瘥豫得此法用之如神若是痞氣莫不應手而瘥凡傷寒胸脹勿問結胸痞氣但先投此藥若不瘥然後別下藥緣此湯但行氣下膈耳無他損又西晉崔行功方傷寒或下或不下心中結滿胸脅痞塞氣急厥逆欲絶心胸高起手足不得近二三日輒死用瀉心大小陷胸湯皆不瘥此當是下後虛逆氣已不理而毒復上攻氣毒相搏結於胸中氣毒相激故致此病療之當用加減理中丸先理其氣次療諸疾加減方人參白朮甘草炙各二兩乾薑炮一兩半枳實十六片麩炒或炙茯苓二兩上為末蜜丸如彈大一丸不效再服豫時用此神速下喉氣即接續復與之不過五六彈丸胸中豁然矣用藥之速未嘗見此渴者更加栝蔞二兩下痢者加牡蠣二兩豫以告領軍韓康伯右衛毛仲祖光祿王道預臺郎顧君苗著作殷仲堪並悉用之咸嘆其應速於時枳實乃為貴緣此病由毒攻於內多類少陰泄利之後理應痞結雖已泄利毒尚未除毒與氣爭凝結於胸時或不利而毒已入胃胃中不通毒必上衝或氣先不理或上焦痰實共相沖結覆成此患大抵毒之與氣相干不宣關津壅遏途徑不通故瀉心療滿而不療氣雖復服之其瘥莫由療毒理結莫過理中丸解毒通氣痞自消釋然乾薑性熱故減其分茯苓通津栝蔞除渴牡蠣止痢謹審其宜無不得矣家人黃珍者得病如上其弟扶就叔尚書乞藥余曰可與理中丸坐中數客皆疑不可豫自決與於箱中取一彈丸與之竺法大調余曰此人不活君微有緣矣與時合暝許比至三籌扶又來便叩頭自搏四座愕然謂其更劇叔問何如扶答向藥一服便覺大佳更復乞耳豫謂竺向答曰上人不憂作緣但恐夜更來乞失人眠耳果爾如何余復與數彈丸明日便愈遂至今用之護軍司法劉元寶妾病亦如此叔復與之一服如雞子一丸便瘥叔知故文武遂多蒙救濟傷寒難療故詳記焉此行功自敘也余以此丸與枳殼湯兼服理無不驗理中丸所用枳實只是枳殼古人只謂之枳實後人方別出枳殼一條梔子湯治胸痹切痛梔子二兩附子炮一兩上每服三錢水一大盞薤白三寸同煎至五分溫服泗州有人病歲余百方不愈服此二服頓愈五積方余家舊方博濟亦載小有不同蒼朮二十兩桔梗十兩陳皮六兩白芷三兩甘草三兩當歸二兩川芎一兩半芍藥白茯苓半夏湯匕洗各一兩麻黃春夏二兩秋冬三兩乾薑春夏一兩半秋冬二兩肉桂春夏三兩秋冬四兩厚朴二兩薑汁炙枳殼麩炒去瓤四兩以後三味別搗和上前十二味為粗末分作六服大鍋內緩火炒令微赤香熟即不可過焦取出以淨紙藉板床上晾令冷入後三物和之和氣每服三錢加薑棗煎至六分去滓服傷寒手足逆冷虛汗不止脈沉細面青嘔逆加順元散一錢同煎熱服産婦陳疏難産經三兩日不生胎死腹中或産母氣乏委頓産道乾澀加順元散水七分酒三分煎進兩服氣血內和即産胎死者不日當下其順元散多量産母虛實傷寒發熱脅內寒者加蔥三寸豉七粒同煎相繼兩三服當以汗解順元散烏頭二兩附子炮天南星各一兩炮木香半兩上豫叔祖錢氏時得此方賣干民家故吳中至今謂之沈氏五積散大抵此散能溫裡外但內外感寒脈遲細沉伏手足冷毛髮怐栗傷寒里證之類大啜三兩杯當手足溫或汗乃愈今世名醫多用此散治氣極效和一切氣通血絡無出此藥人病脾瘧用紫金丸逐下乃服此散數服多愈紫金丹硫黃針沙並三錢鐵粉五錢膩粉十五錢四味炒為末粟米飯丸如彈子大乳香湯下一丸氣實服一丸半至二丸七棗散治脾寒瘧疾川烏頭大者一個炮良久移一處再炮凡七處炮滿去皮臍為細末都作一服用大棗七個生薑十片蔥白七寸水一碗同煎至一盞疾發前先食棗次溫服只一服瘥元祐二年兩浙瘧疾盛作常州李使君舉家病瘧甚久萬端醫禁不效常時至效萬服亦不止過客傳此方一家服之皆一服瘥又長興賈耘老傳一方與此方同只烏頭不炮卻用沸湯泡以物蓋之候溫更泡滿十四遍去皮切焙乾依上法作一服耘老云施此藥三十年治千餘人皆一服瘥蔥尉法治氣虛陽脫體冷無脈氣息欲絶不省人及傷寒陰厥百藥不效者蔥以索纏如盞許大切去根及葉惟存白長二寸許如大餅餤先以火脅一面令通熱又勿令灼人乃以熱處搭病人臍連臍下其上以尉斗滿貯火尉之令蔥餅中熱氣郁入肌肉中須預作三四餅一餅壞不可尉又易一餅良久病人當漸醒手足溫有汗即瘥更服四逆湯輩溫其體萬萬無憂豫伯兄忽病傷寒暝寂不知人八日四體堅冷如石藥不可復入用此遂瘥集賢校理胡完夫用此方拯人之危不可勝數金液丹出博濟方硫黃十兩精瑩者研碎入罐子及八分為度無大滿石龍芮兩握又云狗蹄草一握水鑑草兩握稻田中生一莖四花如田字亦名水田草獨莖生以黃土一掬同搗為泥只用益母草井泥搗亦得上固濟藥罐子約厚半寸置平地以瓦片覆罐口四面炭五斤擁定以熟火一斤自上燃之候罐子九分赤已縫有碧焰急退火以潤灰三斗覆至冷剖罐取藥削去沉底滓濁準前再煅通五煅為足藥如熟雞卵氣急用可三煅止取並罐埋潤地一夜又以水煮半日取藥柳木槌研細滴水候揚之無滓更研令乾每藥一兩用蒸餅一兩湯釋化同搗丸之暴乾金液丹舊方主病甚多大體治氣羸凡久疾虛困久吐利不瘥老人臟祕傷寒脈微陰厥之類皆氣羸所致服此多瘥大人數十丸至百丸小兒以意裁度多少皆粥飲下羸甚者化灌之小兒久吐利垂困藥乳皆不入委頓待盡者並與數十丸往往自死得生少與即無益豫親見小兒吐利極已氣絶棄之在地知其不救試謾與服之復活者數人
