body:
  text: 卷第四服茯苓説茯苓自是仙家上藥但其中有赤筋脈若不能去服久不利人眼或使人眼小當削去皮切為方寸塊銀石器中清水煮以酥軟解散為度入細布袋中以冷水揉擺如作葛粉狀澄取粉而筋脈留布袋中棄去不用其粉以蜜和如濕香狀蒸過食之尤佳胡麻但取純黑脂麻九蒸九暴入水爛研濾取白汁銀石器中熬如作杏酪湯更入去皮核爛研棗內與茯苓粉一處搜和食之尤有奇效服茯苓賦並引豫少而多病夏則脾不勝食秋則肺不勝寒治肺則病脾治脾則病肺平居服藥殆不復能愈年三十有二官於宛邱或憐而受之以道士服氣法行之期年疾良愈蓋自是始有意養生之説晚讀抱朴子書言服氣與草木之藥皆不能致長生古神仙真人皆服金丹以為草木之性埋之則腐煮之則爛燒之則焦不能自生而況能生人乎豫既汩沒世俗意金丹不可得也則試求之草本之類寒暑不能稜歲月不能敗惟松柏為然古書言松脂流入地下為茯苓茯苓千歲舉則為琥珀雖非金玉而能自完也亦久矣於是求之名山屑而治之去其脈絡而取其精華庶幾可以固形養氣延年而卻老者因為之賦以道之春而榮夏而茂憔悴乎風霜之前摧折乎冰雪之後閲寒暑以同化委糞壤而兼朽茲固百草之微細與衆木之凡陋雖或效骨骼於刀幾儘性命於杵臼解急難於俄頃破奇邪於邂逅然皆受命淺狹與時變遷朝菌無日蟪蛄無年苟自救之不暇矧他人之足延乃欲擷根莖之微末假臭味以登仙是猶托疲牛於千里駕鳴鳩以登天則亦辛勤於澗谷之底稿死於峰崖之巔顧桑榆之竊嘆意神仙之不然者矣若夫南澗之松拔地千尺皮厚犀兕根堅鐵石鬚髮不改蒼然獨立流膏脂於黃泉乘陰陽而固結像鳥獸之蹲伏類龜蛇之閉蟄外黝黑似鱗皴中結白而純密上霍莽之不犯下螻蟻之莫賊經歷千歲化為琥珀受雨露以彌堅與日月而終畢故能安魂魄而定心志卻五味與穀粒追赤松於上古以百歲為一息顏如處子緑髮方目神止氣定浮遊自得然後乘天地之正御六氣之辨以遊夫無窮又何求而何食木香散治臟腑冷極及久冷傷憊口瘡下泄穀米不化飲食無味肌肉瘦悴心多嗔恚婦人産後虛冷下泄一切水瀉冷痢木香散木香破故紙高良薑砂仁厚朴薑汁炙各三分赤芍藥陳橘紅肉桂白朮各半兩胡椒吳茱萸湯洗去黑水各一分肉豆蔻四枚檳榔一個上為散每服三錢不經水豬肝四兩許去筋膜批為薄片重重摻藥置一鼎中入漿水一碗醋一茶腳許蓋覆煮肝熟入鹽一錢蔥白三莖細切生薑彈子許捶碎同煮水欲盡空心為一服冷食之初服微瀉不妨此是逐下冷氣少時自止經年冷利滑瀉只是一服渴即飲粥湯下忌生冷油膩物如不能食冷物即添少漿水暖服張簡夫職方嘗久瀉忽有人召食以疾辭不往主人曰吾有良藥一服可瘥煮藥而召之簡至先服藥便就席熟醉而歸竟不復瀉簡夫得此方與人服莫不神應嘉興謝醫得此方惡其煩只用漿水煮豬肝為丸如梧桐子大每服五十丸粥飲下其效亦同若暴瀉利只是一服唯熱痢熱瀉不治豫家極寶此藥可大驚異非余藥可比硇砂煎丸治一切積滯化氣消食補益真氣産後逐敗血補虛損至善硇砂一兩揀通明無石者別研令如粉舶上茴香一兩略炒當歸一兩無灰酒浸一宿去蘆了薄切片子焙金鈴子三兩洗過切破四兩無灰酒浸一宿候軟以刀子削下瓤去皮核不用肉蓯蓉一兩無灰酒浸一宿薄切作片子干穿心巴戟一兩無灰酒浸一宿去心用天雄一兩無灰酒煮五七百沸候軟刮去皮檳榔一兩木香沉香黑附子各一兩阿魏半兩米醋磨成膏入諸藥上細末以無灰酒煮白麵糊丸如梧桐子大每服三十丸空心日午溫酒下此方家家有豫家婦嘗病蓐中下痢日久甚困篤百方不瘥士人李潛善醫曰蓐中下痢與他痢不同常痢可用苦澀藥止之蓐中痢生於血不足投澀藥則血愈不行痢當更甚為豫作硇砂法云此藥果能治産後痢先以桂小丸下之次投硇砂丸日九十丸痢頓減半次日遂愈硇砂丸産後雖無疾亦宜服之能養血去積滯桂丸方今附於後硇砂研肉桂甘遂丁香木香芫花醋炒焦巴豆去心皮不去油上各等分搗治麵糊為丸小緑豆大每服二丸三丸溫水下加減更量虛實潛名醫也云此丸取積最勝不以久近皆能化黑神丸漆六兩半生半用重湯煮一半日令香神麯四兩茴香四兩木香椒紅丁香各半兩檳榔除椒外五物皆半生半炒四個上丸如彈丸大取茴香末十二兩鋪蓋陰地陰乾候外干並茴香收器中極干乃去茴香腎余育腸膀胱痃癖七疝下墜五膈血崩産後諸血漏下赤白並丸分四服死胎一丸皆無灰酒下難産炒葵子四十九枚搗碎酒煎下一丸諸疾不過三服元氣十服膈氣症癖五服血瘕三丸當瘥豫族子婦病腹中有大塊如痞每發痛不可堪時子婦已貴京下善醫者悉嘗服其藥莫愈陳應之曰此血瘕也投黑神丸盡三丸痞氣消盡終身不復作神保丸出靈苑木香一分胡椒一分巴豆十枚去皮心研乾蠍一枚上湯釋蒸餅丸麻子大硃砂為衣每服三丸心膈痛柿蒂湯下或燈心同柿蒂湯下腹痛柿蒂煨薑湯下血痛炒薑醋小便下小便不通燈心湯下血痢臟毒楮葉湯下肺氣甚者白礬蚌粉各三分黃丹一分同研為散煎桑白皮糯米飲調下三丸若小喘止用桑皮糯米飲下腎氣脅下痛茴香酒下大便不通蜜湯調檳榔末一錢同下氣噎木香湯下宿食不消茶酒漿飲任下豫三十年前客金陵醫人王琪傳此方琪云諸氣惟膀胱氣脅下痛最難治獨此丸輒能去之熙寧中豫病項筋痛諸醫皆以為風治之數月不瘥乃流入背膂久之右注脅攣痛甚苦憶琪語方向已編入靈苑取讀之有此一驗乃合服之一投而瘥後再發又一投而瘥小建中湯治腹中切痛桂削生薑切各三分甘草炙半兩大棗十二枚擘白芍一兩半膠飴二兩以上並細切上以水二升煮取九合去滓內飴更上火微煮令飴化溫服三合日三服嘗有人患心腹病不可忍纍用良醫治之皆不效灸十餘處亦不差士人陳承善醫投一藥遂定問之乃小建中湯也此藥偏治腹中虛寒補血尤主腹痛常人見其藥性溫平未必信之古人補虛只用此體面藥不須附子硫黃承用此藥治腹痛如神然腹痛按之便痛重按卻不甚痛此止是氣痛重按愈痛而堅者當自有積也氣痛不可下下之愈痛此虛寒證也此藥尤相當按外臺虛勞腹中痛夢失精四肢痠痛手足煩熱咽乾口燥婦人少腹痛宜服仲景傷寒論陽脈澀陰脈弦法當腹中急痛先與此不瘥小柴胡湯主之此二藥皆主腹痛豫已於小柴胡湯敘之若作散即每服五錢匕生薑五片棗三個大者飴一栗大若疾勢甚須作湯劑散服恐力不勝病元豐中丞相王郇公病小腹痛不止宣差太醫攻治備至皆不效凡藥之至熱如附子硫黃五夜乂丸之類用之亦不瘥駙馬張都尉令取婦人油頭髮燒為灰細研篩過溫酒服二錢即時痛止女用男發進食散青皮陳皮去穰各一分草豆蔻三個甘草一分炙訶子去核煨五個高良薑薄切炒一分川烏頭一個炮去皮臍肉桂一分去外皮上每服一錢水一中盞生薑二片煎至七分食空時服此盧州李潛方治脾胃虛冷不思食及久病入脾虛全不食者只一二服便頓能食潛名醫也豫目見在真州治賈使君女子已五十餘日病脾多嘔都不進食醫絶無驗潛投此藥一服遂食蒸餅半枚明日百味皆思潛云此藥進食極神速豫疑此藥太熱潛云不然用之三十年無不效者壓氣散止逆定喘治疏取多後氣乏控上膈者木香人參白茯苓藿香枳殼陳橘皮甘草炙以上各等分附子炮半上服一大錢煎紫蘇木瓜生薑湯再入銀盞重湯煎五七沸通口服訶子丸消食化氣訶子皮二兩洗炮木香白豆蔻檳榔桂人參乾薑茯苓以上各二兩牽牛子一兩略炒甘草粗大者炙一兩上酒煮麵糊為丸梧桐子大每服十五丸至二十丸如有氣疾發動吃食過多築心滿悶爛嚼茶酒任下陸子履學士知蔡州平興縣值石普南遷子履與治行甚勤普極德之未幾普召還過平興見子履敘南行之惠曰他物不足以為報有一藥方奉傳乃此方也云普啖物極多常致憤悶成疾服此輒愈豫問子履求得之家中常合食飽脹滿及氣膨胸膈只一服如人手按下極有驗也椒朴丸治脾胃虛冷歲久不思飲食或發虛腫或日漸羸瘦四肢衰倦吐利無節應脾虛候狀皆可服食漢椒去目厚朴去粗皮銼茴香青鹽淘去沙土取浮上各二兩以水二升煮令乾焙燥搗為末麵糊丸梧桐子大每服三四十丸空心米飲下及鹽湯下病深者日三服豫中表許君病脾逾年通身黃腫不能起全不嗜食其甥為本道轉運使日遣良醫治之都不效有傅主簿傳此方服十許日漸安自爾常服肌膚充碩嗜飲美食兼人面色紅潤年六十餘日行數十里強力如少年椒朴丸博濟及諸集中多載有加附子者有加薑輩皆不快捷此方得其精要與病相當如神慎勿增他藥藥之中病處人多不識看不上面自有奇功多因增益他藥卻致不驗此難可以意測也湖州處士劉某其叔父病喘手足皆腫殆不能起劉君夢有人謂之曰君叔父病脾橫病瀉四肢非他也子有隱德吾能愈子叔父之疾手疏方以授之曰無礙丸且誠曰慎勿服他藥劉君得方以餌其叔父三餌而疾間君先迎醫於錢塘後數日醫至曰此肺逆當治肺藥入口疾復作君論曰神人預嘗誡我急謝醫後投無礙丸遂瘥無礙丸大腹炙二兩蓬莪朮三稜皆濕紙裹煨熟一兩木香麵裹煨熟五錢檳榔生一分上為末炒麥糵搗粉為糊丸如梧桐子大服二三十丸生薑湯下治脾胃虛弱並婦人脾血久冷桂香散高良薑銼炒香熟草豆蔻去殼炒甘草白朮砂仁厚朴去粗皮銼以上各一兩青橘皮去穰炒黃訶子肉各半兩肉桂一分生薑一兩切棗肉一兩切二味同厚朴一處用水一碗煎令乾同杵為團焙乾用上同為末每服二錢入鹽少許沸湯點空心服此藥偏療腹痛天台呂使君自來有腹痛遇疾發即悶絶連日不瘥有一道士點此散飲之一服遂定自後每發即飲數服痛如失去豫得之纍與人服莫不神驗治冷瀉尤妙腹痛最難得藥此方只是溫脾耳特工止痛理不可知健脾散治胃虛泄瀉老人臟泄尤效烏頭炮三分厚朴薑炙甘草炙乾薑炮各一分上服一錢水三合生薑二片煎至二合熱服並二服止家嘗貯此藥治脾泄極驗香薑散治久患脾泄瀉出博濟方生薑四兩黃連一兩上銼碎如豆大一處慢火炒令薑乾脆深赤色去薑取黃連為細末服一錢空腹臘茶清下不過二服瘥引氣丹治一切滯氣硃砂碾安息香研麝香研各一分白芥子三百六十粒炒大戟末一錢匕沒藥一錢研入牛黃五分研入牽牛末一錢匕五靈脂一錢研入乳香一錢研入班蝥二十七個去頭翅足研入巴豆二十七粒去皮研出油不出油助使快上件都研令勻用紅米飯為丸如麻子大臨時湯使下之太醫院潘璟帶囊中常貯此藥倉卒疾多用之沉麝丸治一切氣痛不可忍端午日午時合沒藥辰砂血蠍各一兩木香半兩麝香一錢沉香一兩上各生用銀瓷器熬生甘草膏為丸皂角子大薑鹽湯送下血氣醋湯嚼下松滋令萬君擬寶此藥婦人血痛不可忍者只一丸萬君神祕之每有人病止肯與半丸往往亦瘥治諸氣礞石丸硇砂一兩米醋三升化巴豆霜二兩半以上先煮青礞石半兩研三稜醋浸一宿煨一兩以上次煮大黃一兩半分三分煨炒又次煎木香檳榔肉豆蔻豬牙皂角去皮炒一云炙肉桂乾薑炮丁香蓬莪朮各一兩芫花醋浸一宿炒微有煙青橘皮白豆蔻墨燒八分過各半兩胡椒一分粉霜研一分面二兩酒半斤化又次煎上硇砂醋合巴豆煮兩食久投礞石三稜又投酒面又投大黃相去皆半食久乃入衆藥熬丸如緑豆大每服三五丸酒飲雜下凡症積飲食所傷氣凝穀食不化皆能愈消食化氣止瀉腹中諸冷疾褐丸烏頭炮去皮桂香附子微炒乾薑炮陳橘皮微炒上先用川巴豆取肉麻油內慢火煎自旦及午候巴豆如皂子色即止淨拭冷水中浸兩日日再換水又拭乾研如油極細須研一日方可用以鐵匙刮出薄攤新瓦上如一重紙厚候一復時以鐵匙刮下再研極細每巴豆霜一兩即諸藥各五兩為細末與巴豆同研千萬匝再用絹羅過更研令勻陳米一升半為細末水調成膏直候微酸臭即煮為硬糊細研令無塊硬處乃與衆藥一處為丸如緑豆大每服五七丸隨湯使下此只是食藥然食藥方至多無如此方者能和脾胃消氣進食止瀉去積凡食物壅隘服之即消應腹中不平脾胃諸疾服之莫不康泰蘇州有人賣一硃砂丸食藥無所不治其效如神如此致巨富服其藥者遍天下人無有得其真方者後有親人竊得乃與此一同但加硃砂為衣耳人家宜常合長少皆可服的的可賴神聖香茸散出吳兢五臟論治胃氣霍亂吐瀉轉筋腹痛香薷穗經霜者一兩半新厚朴取二兩心川黃連二兩白扁豆一兩焙上先用薑汁四兩一處杵黃連厚朴二味令細炒成黑色入香薷扁豆二味都為末每服五錢水一盞酒一盞共煎至一盞入瓷瓶內蠟紙封沉入井底候極冷一併服二服瀕死者亦生京師賣此藥一服百錢治胃氣小腹切痛治腹中氣塊大黃蓽茇等分皆生上蜜丸桐子大麝香水下二三十丸空心日三服貴州守李承議得嵐瘴夫婦兒女數人相繼而死有二子歸嶺北皆病腹中有塊如瓜瘦苦欲死陳應之與此方服及三十服氣塊皆消應之云此寒熱相雜所致當以寒熱二物攻之暴下方歐陽文忠公常得暴下國醫不能愈夫人云市人有此藥三文一貼甚效公曰吾輩臟腑與市人不同不可服夫人使以國醫藥雜進之一服而愈公召賣者厚遺之求其方久之乃肯傳但用車前子一味為末米飲下二錢匕云此藥利水道而不動氣水道利則清濁分谷臟自止矣治瀉痢方肉豆蔻刳作甕子入通明乳香少許復以末塞之不盡即用面和少許裹豆蔻煨熟焦黃為度三物皆研末仍以茶末對烹之茶方憲宗賜馬總治瀉痢腹痛方以生薑和皮切碎如粟米用一大盞並草茶相對煎服元祐二年文忠公得此疾百藥不效豫傳此方而愈
