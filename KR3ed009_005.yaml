body:
  text: 卷第五與翟東玉求地黃馬火也故將火而夢馬火就燥燥而不已則窮故膏油所以為無窮也藥之膏油者莫如地黃啖老馬復為駒樂天詩云與君啖老馬可使照地光今人不復能知此法吾晚學道血氣衰耗如老馬矣欲多食生地黃而不可常致忽見人言循州興寧令歐陽叔向於縣圃中多種此藥意欲作書千之而未敢君與叔向故人可為致此意否此藥以二八月採者良如許以此時寄惠為幸欲烹以為煎也蘇合香丸治肺痿客忤鬼氣傳尸伏連殗殜等疾卒得心痛霍亂吐痢時氣諸瘧瘀血月閉痃癖丁腫驚癇邪氣狐媚瘴癘萬疾蘇合香白朮硃砂沉香訶子肉丁香木香香附子白檀香烏犀屑乳香蓽茇安息香各一兩麝香龍腦各半兩上為末煉蜜丸如雞頭實大每服一丸溫酒嚼下人參湯亦得此方人家皆有恐未知其神驗耳本出廣濟方謂之白朮丸後人編入外臺千金方云真宗朝嘗出蘇合香酒賜近臣又賜蘇合香丸自此方盛行於世此藥大能安氣血卻外邪凡疾自內作不曉其名者服此往往得效唯治氣疰氣厥氣逆不和吐利榮衛阻塞尤有神功豫所親見者嘗有淮南監司官謝執方因嘔血甚久遂奄奄而絶羸敗已久手足都冷鼻息皆絶計無所出唯研蘇合香丸灌之盡半兩遂蘇又豫所乘船有一船工之子病傷寒日久而死但心窩尚暖不忍不與藥棄已不救試與蘇合香丸灌之四丸乃醒遂瘥豫友人為兩浙提點刑獄嘗病大瀉目視天地皆轉神思不理諸藥不效服藥至兩丸許頓覺輕爽腹瀉亦止豫目睹救人於將絶者不可勝記人家不可無此藥以備急難瘟疫時尤宜服之闢疫尤驗倉卒求人參不得只白湯亦佳勿用酒古方雖云用酒下酒多不效切宜記之東陽劉使君少時嘗病瘵日漸羸削至於骨立肌熱盜汗勞狀皆具人有勸服此藥凡服八九兩所苦都瘥一方有牛黃半兩古方本無乃後人加之諸勞明月丹兔屎四十九枚硇砂如兔屎相類大者四十九枚上用生蜜丸以生甘草半兩碎浸一夜取汁五更初下七丸勿令病人知勞藥下後頻看若有蟲急打殺以桑火油煎使焦棄惡水中三日不下更服須月三日以後望前服之忌見喪服色衣婦人貓犬之類後服治勞補氣藥取瘥威愍孫元規藏此方數能活人江陰萬融病勞四體如焚垂困一夜夢神腹擁一月大如盤明爛不可正視逼人心骨皆寒已而悸寤俄有人扣關乃威愍使人遺之藥服之遂瘥問其名則明月丹也始悟向之所夢大抵此藥最治熱勞又云傷寒煩躁骨熱皆治療火角法治久嗽冷痰咳嗽及多年勞嗽服藥無效者雄黃通明不夾石者一兩雌黃不夾石者半兩二味同研極細末蠟二兩上先熔蠟令汁下藥末攪勻候凝刮下用紙三五假每假闊五寸長一尺蠟熔藥塗其一面令厚以竹箭捲成筒子令有藥在裡干令相著乃拔去箭臨臥尉斗內盛火燃筒子一頭令有煙乃就筒子長引氣吸取煙陳米飲送下及吸每三吸為一節當大咳咯出冷涎即以衣覆臥良久汗出若病三五年者二三節即瘥十年以上嗽甚咳聲不絶胸中常有冷痰服藥寒溫補瀉保無效者日一為之不過五七日良愈先君戶部病痰嗽胸中常如冰雪三年而伯父繼感嗽又六年羸瘵殆困百方治之皆莫愈用此二三為之皆瘥治積年肺氣九寶散大腹並皮肉桂甘草炙乾紫蘇杏仁去皮尖桑根白皮各一兩麻黃去根陳皮炒干薄荷各三兩上搗為粗末每服十錢匕用水一大盞童便半盞烏梅二個姜錢五片同煎至一中盞濾去滓食後臨臥服兩浙張大夫病喘二十年每至秋冬輒劇不可坐臥百方不瘥後得臨平僧法本方服之遂瘥法本凡病喘三十年服此藥半年乃絶根本永不復發凡服此藥須久乃效何首烏散治腳氣流疰頭目昏重肢節痛手足冷重熱拘攣浮腫麻痹目生黑花出靈苑何首烏水浸一日切厚半寸黑豆水拌勻令濕何首烏重重相間蒸豆爛去豆陰乾仙靈脾葉牛膝以上各酒浸一宿烏頭水浸七日入鹽二兩半炒黃色各半斤上每服二錢酒下或粥飲調下日三服空心食前久患者半月效先君同官王綽禮部有女子病足攣痛二歲得此半月愈豫老姨亦病手足骨髓中痛不能堪久治不瘥亦得此愈治消渴方眉山有楊穎臣者長七尺健飲啖倜儻人也忽得消渴疾日飲水數斗食倍常而數溺消渴藥服之逾年疾日甚自度必死治棺衾囑其子於人蜀有良醫張元隱之子不記其名為診脈笑曰君幾誤死矣取麝香當門子以酒濡之作十許丸取枳枸子為湯飲之遂愈問其故張生言消渴消中皆脾衰而腎憊土不能勝水腎液不上溯乃成此疾今診穎臣脾脈極熱而腎不衰當由果實酒過度虛熱在脾故飲食兼人而多飲水水多不得不多溺也非消渴也麝香能敗酒瓜果近輒不植而枳枸子亦能勝酒屋外有此木屋中釀酒不熟以其木為屋其下亦不可釀酒故以此二物為藥以去酒果之毒也宋玉云枳枸束巢枳音俱里切枸音矩以其實如鳥乳故能束巢今俗訛謂之雞矩子亦謂之癩漢指頭蓋取其似也嚼之如乳小兒喜食之經效阿膠丸治嗽並嗽血唾血阿膠銼碎微炒卷柏去塵土乾山藥生乾地黃熟者不用雞蘇大薊獨根者最佳日影干五味子以上各一兩淨柏子仁別研茯苓人參百部遠志去心麥門冬防風以上各半兩淨上十四味並擇好藥材依方修制搗羅為末煉蜜丸如彈子大不拘時候濃煎小麥並麥門冬湯下半丸加至一丸若覺氣虛空心不用服灸咳逆法豫族中有病霍亂吐痢垂困忽發咳逆半日之間遂至危殆有一客云有灸咳逆法凡傷寒及久疾得咳逆皆為惡候投藥皆不效者灸之必愈豫遂令灸之火至肌咳逆已定元豐間豫為鄜延經略使有幕官張平序病傷寒已困一日官屬會飲通判延州陳平裕忽言張平序已屬纊求往見之豫問何遽至此云咳逆甚氣已不屬豫忽記灸法試令灸之未食𭎸中裕復來喜笑曰一灸遂瘥其法乳下一指許正與乳相直骨間陷中婦人即屈乳頭度之乳頭齊處是穴艾炷如小豆許灸三壯男灸左女灸右只一處火到肌即瘥若不瘥則多不救矣羌活散出靈苑止咳逆羌活附子炮茴香微炒各半兩木香乾薑炮各棗許上每服二錢水一盞鹽一捻煎一二十沸帶熱服一服止治肺喘蒲頽葉微似海棠葉尤柔厚背白似熟羊皮經冬不凋花正如丁香蒂極細如絲倒懸之風吹則搖搖然冬末生花至春乃敷實一如山茱萸味酸可啖與麥齊熟其木甚大吳人名半舍江南名棠京師名曰紙錢棠球襄漢名黃婆奶上一物為末每服二錢水煎或溫水調下發時服有人患喘三十年者服之皆愈疾甚者服後胸上生小癮疹癢者其疾即瘥一方用人參等分服硃砂膏鎮志安神解熱及損嗽血等疾硃砂一兩別研細金末一分用箔子研牛黃麝香生腦子硼砂各半兩生犀玳瑁真珠末各一兩蚌末不可用琥珀別研羚羊角各半兩蘇合香用油和藥亦可鐵液粉各一分安息香半兩酒蒸去沙石別研入藥人參一兩遠志去心茯苓各半兩甘草一兩微炙參以下四味同搗上都為細末拌和煉蜜破蘇合油劑諸藥為小錠子更以金箔裹瓷器內密封每用一皂子大食後含化衛尉業丞得效並阿膠丸相雜服此治血安神更勝至寶丹蕊珠丹鎮心空膈去八邪氣及婦人血攻寒熱等疾但驚憂成疾皆主之辰砂一兩一分鳳尾草一握水研汁煮砂一分更水洗乾研桃仁四十九枚生附子一分半紙裹煨安息香一分蜜一分酒少許煮煎成膏麝香二錢阿魏薄切微焙木香各半兩牛黃一分丸如豆大五丸至十丸婦人桃心醋湯下丈夫桃心鹽湯下簡侍郎之妻因悲憂病腹中有兩塊如拳每相沖擊則悶絶堅不可破歲余服此藥兩塊皆失所在至寶丹出靈苑本池州醫鄭感慶曆中為豫處此方以屢效遂編入靈苑生烏犀生玳瑁琥珀硃砂雄黃各一兩牛黃一分龍腦一分麝香一分安息香一兩半酒浸重湯煮令化濾去滓約取一兩淨金箔各五十片上丸如皂角子大人參湯下一丸小兒量減舊說主疾甚多大體專療心熱血凝心膽虛弱喜驚多涎眠中驚魘小兒驚熱女子憂勞血滯血厥産後心虛怔忪尤效血病生薑小便化下治血氣心腹痛四神散出靈苑當歸芍藥川芎各一兩乾薑半兩炮上每服二錢暖酒調下豫每作以療婦人氣痛常以一服瘥半夏湯治急下涎齊州半夏七枚炮裂四破之皂角去皮炙寸半甘草一寸生薑兩指大上同以水一碗煮去半頓服沈興宗待制常病痰喘不能臥人扶而坐數日矣客有見之者曰我曾如此得藥一服瘥以千緡酬之謂之千緡湯可試為之興宗得湯一啜而愈白雪丸治痰壅胸膈嘈逆及頭目昏眩困倦頭目脹痛天南星炮烏頭炮去皮白附子生半夏洗各一兩滑石研石膏龍腦麝香研各一分上稀麵糊為丸極稀為妙如緑豆大每服三十丸姜臘茶或薄荷茶下豫每遇頭目昏困精神懵冒胸中痰逆憒憒如中酒則服此藥良久間如搴一重裘豁然清爽頓覺夷暢食後服為佳龍膽丸解暴熱化痰涼膈清頭目草龍膽白礬煅四兩天南星半夏各二兩半水浸切作片用漿水雪水各半同煮三五沸焙乾上為末麵糊為丸梧桐子大每服三十丸臘茶清下食後臨臥服麵糊須極稀如濃漿可也應痰壅膈熱頭目昏重服之頓清嶺南瘴毒才覺意思昏悶速服便解咽喉腫痛口舌生瘡凡上壅熱涎諸證悉可服小兒尤良
