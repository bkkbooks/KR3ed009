body:
  text: 卷第六問養生余問養生於吳子得二言焉曰和曰安何謂和曰子不見天地之為寒暑乎寒暑之極至為折膠流金而物不以為病其變者微也寒暑之變晝與日俱逝夜與月並馳俯仰之間屢變而人不知者微之至和之極也使此二極者相尋而狎至則人之死久矣何謂安曰吾嘗自牢山浮海達於淮遇大風焉舟中之人如附於桔槔而與之上下如蹈車輪而行反逆眩亂不可止而吾飲食起居如他日吾非有異術也惟莫與之爭而聽其所為顧凡病我者舉非物也食中有蛆人之見者必嘔也其不見而食者未嘗嘔也請察其所從生論八珍者必咽言糞穢者必唾二者未嘗與我接也唾與咽何從生哉果生於我乎知其生於我也則雖與之接而不變安之至也安則物之感我者輕和則我之應物者順外輕內順而生理備矣吳子古之靜者也其觀於物也審矣是以私識其言而時省觀焉論修養寄子由任性逍遙隨緣放曠但盡凡心別無勝解以我觀之凡心盡處勝解卓然但此勝解不屬有無不通言話故祖師教人到此便住如眼翳盡眼自有明醫師只有除翳藥何曾有求明藥明若可求即還是翳固不可翳中求明即不可言翳外無明夫世之昧者便將頽然無知認作佛地若此是佛貓兒狗兒得飽熟睡腹搖鼻息與土木同當恁麼時可謂無一毫思念豈謂貓兒狗兒已入佛地故凡學者當觀妄除愛自粗及細念念不忘會作一日得無所除弟所教我者是如此否因見二偈警策孔君不覺聳然更以問之書至此牆外有悍婦與夫相毆罵聲飛灰火如豬嘶狗嗥因念他一點圓明正在豬嘶狗嗥裡面譬若江河鑑物之性長在飛砂走石之中尋常靜中推求常患不見今日鬧里捉得些子如何元豐六年養生說已飢先食未飽先止散步逍遙務令腹空每腹空時即便入定不拘晝夜坐臥自便惟在攝身使如木偶常自念言我今此身若少動搖如毛髮許便墮地獄如商君法如孫武令事在必行有死無犯又用佛語及老君語視鼻端自數出入息綿綿若存用之不勤數至數百此心寂然此身兀然與虛空等不煩禁制自然不動數至數千或不能數則有一法其名曰隨與息俱出復與俱入隨之不已一息自住不出不入或覺此息從毛竅中八萬四千云蒸霧散無始已來諸病自除諸障自滅自然明悟譬如盲人忽然有眼此時何用求人指路是故老人言盡如此續養生論鄭子産曰火烈者人望而畏之水弱者人狎而玩之翼奉論六情十二律其論水火也曰北方之情好也好行貪狠南方之情惡也惡行廉正廉正故為君子貪狠故為小人豫參二人之學而為之說曰火烈而水弱烈生正弱生邪火為心水為腎故五臟之性心正而腎邪腎無不邪者雖上智之腎亦邪然上智常不淫者心之官正而腎聽命也心無不正者雖下愚之心亦正然下愚常淫者心不官而腎為政也知此則知鉛汞龍虎之說矣何謂鉛凡氣之謂鉛或趨或蹶或呼或吸或執或擊凡動物者皆鉛肺實出納之肺為金為白虎故曰鉛又曰虎何為汞凡水皆為汞唾㖒膿血精汗便利凡濕者皆汞也肝實宿藏之肝為木為青龍故曰汞又曰龍古之真人論內丹曰五行顛倒術龍從火內出五行不順行虎向水中生世未有知其說者也方五行之順行也則龍出於水虎出於火皆死之道也心不官而腎為政聲色外誘淫邪內發壬癸之英下流為人或為腐壞是汞龍之出於水也喜怒哀樂皆出於心者也喜則攖拿隨之怒則毆擊隨之哀則劈踴隨之樂則抃舞隨之心動於內而氣應於外是鉛虎之出於火者也汞龍之出於水鉛虎之出於火有能出於火有能出於水而復返者乎故曰皆死之道也真人教之以逆行龍從火出虎從水生也其說若何孔子曰思無邪凡有思皆邪也而無思則土木也孰能使有思而非邪無思而非土木乎蓋必有無思之思焉夫無思之思端正莊栗如臨君師未嘗一念放逸然卒無所思如龜毛兔角非作故無本性無故是謂之戒戒生定定則出入息自住出入息住則心火不復炎在易為離離麗也必有所麗未嘗獨立而汞其妃也既不炎上則從其妃矣水火合則壬癸之英上流於腦而溢於元英若鼻液而不咸非腎出故也此汞龍之自火出者也長生之藥內丹之萌無過此者矣陰陽之始交天一為水凡人之始造形皆水也故五行一曰水從暖氣而後生故二曰火生而後有骨故三曰木骨生而日堅凡物之堅壯者皆金氣也故四曰金骨堅而後生肉焉土為肉故五曰土人之在母也母呼亦呼母吸亦吸口鼻皆閉而以臍達故臍者生之根也汞龍之出於火流於腦溢於元英必歸於根心火不炎上必從其妃是火常在根也故壬癸之英得火而日堅達於四肢浹於肌膚而日壯究其極則金剛之體也此鉛虎之自水出者也龍虎生而內丹成矣故曰順行則為人逆行則為道道則末也亦可為長生不死之術矣書養生論後東坡居士桑榆之末景憂患之餘生而後學道雖為達者所笑然猶賢乎已也以嵇叔夜養生論頗中豫病故手寫數本其一以贈羅浮鄭師養生偈閒邪存誠煉氣養精一存一明一煉一清清明乃極丹元乃生坎離乃交梨棗乃成中夜危坐服此四藥一藥一至則極則處幾費千息閒之廓然存之卓然養之郁然煉之赫然守之以一成之以久功在一日何遲之有易曰閒邪存其誠詳味此字知邪中有誠無非邪者閒亦邪也至於無所閒乃見其誠者幻滅滅故非幻不滅養生說吳子野云芡實蓋溫平耳本不能大益人然俗謂水硫黃何也人之食芡也必枚齧而細嚼之未有多嘬而亟咽者也舌頰唇齒終日囁嚅而芡無五味腴而不膩是以致玉池之水故食芡者能使人華液流通轉相攝注積其力雖過乳石可也以此知人能淡食而徐飽者當有大益吾在黃岡中見牧羊者必驅之瘠土云草短而有味羊得細嚼則肥而無疾羊猶爾況人乎食芡法養生之方以胎息為本此固不刊之語更無可議但以氣若不閉任其出入則渺綿滉漭無卓然近效待其兀然自住恐終無此期若閉而留之不過三十五息奔突而出雖有微暖養下丹田此一溉於湯決非度世之術近日深思似有所得蓋因看孫真人養生門中調氣第五篇反覆尋究恐是如此其略曰和神氣之道當得密室閉戶安床暖席枕高二寸半正身僵臥瞑目閉氣於胸膈間以鴻毛著鼻止而不動經三百息耳無所聞目無所見心無所思則寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人也此一段要訣弟且靜心細意字字研究看既云閉氣於胸膈恐是不閉鼻中氣只以意堅守此氣於胸膈中令出入息似動不動氤氳縹眇如香爐蓋上煙湯瓶嘴中氣自在出入無呼吸之者則鴻毛可以不動若心不起念雖過三百息可也仍須一切依此本訣臥而為之仍須直以鴻毛黏著鼻端以意守氣於胸中遇欲吸時不免微吸及其呼時雖不得呼但任其氤氳縹眇微微自出盡氣乎則又微吸如此出入元不斷而鴻毛自不動動亦極微覺其微動則又加意制勒之以不動為度雖云制勒然終不閉至數百息出者少不出者多則內守充盛血脈通流上下相灌輸而生理備矣兄悟此元意甚以為奇恐是夜夜燒香神啓其心自悟自證適值痔疾及熱甚未能力行亦時時小試覺其理不謬更候疾平天涼稍稍置力續見效當報弟不可謂出意杜撰而輕之也胎息法抱朴子云古人藏丹砂井中而飲者猶獲上壽今但懸望大丹丹既不可望又學燒而藥物火候皆未必真縱使燒成又畏火毒而未能服何不趁此且服生丹砂意謂過百日者力亦不慢草藥是覆盆子亦神仙所餌百日熬煉草石之氣亦相乳入每日五更以井花水服三丸服罷以意送至下丹田心火溫養久之意謂必有絲毫留者積三百餘服恐必有刀圭留丹田致一之道初若眇昧久乃有不可量者況老夫別無見解直欲以拙守而致神仙此大可笑亦可取也藏丹砂法吾雖了了見此理而資躁褊害之者衆恐未便成子由端靜淳淑使少加意當先我得道爾必卻度我故書此紙為異日信非虛語也紹聖二年上張安道養生訣某近年頗留意養生讀書延問方士多矣其法百數擇其簡而易行者間或行之輟有其驗今此閒放益究其妙乃知神仙長生非虛語爾其效初不甚覺但積纍百餘日功用不可量比之服藥其效百倍久欲獻之左右其妙處非言語文字所能形容然亦可道其大略若信而行之必有大益其訣具下每日以子時後三更三四點至五更以來皆可披衣坐只床上擁被坐亦得面東或南盤足坐扣齒三十六通握固以兩拇指掏第二指手紋或以四指都握拇指兩手拄腰腹間閉息閉息敢是道家要妙先須閉目靜慮掃滅妄想使心源湛然諸念不起自覺出入息調勻微細即閉口並鼻不令氣出也內視五臟肺白肝青脾黃心赤腎黑當便求五臟圖煙羅子之類常掛壁上便中心熟議五臟六腑之形狀次想心為炎火光明洞徹入下丹田中丹田在臍下待腹滿氣極則徐出氣不得令耳聞聲候出息勻調即以舌攪唇齒內外漱煉津液若有鼻涕亦須潄煉不嫌其咸漱煉良久自然甘美此是真氣未得咽下復作前法閉息內觀納心丹田調息漱津皆依前法如此者三津液滿口即低頭咽下以氣送下丹田中須用意精猛令津與氣谷谷然有聲徑入丹田又依前法為之凡九閉息三咽津而止然後以左手熟摩兩腳心此湧泉穴上徹頂門氣訣之妙及臍下腰脊間皆令熱徹徐徐摩之微汗出不妨不可喘次以兩手摩尉眼面耳項皆令極熱仍按捏鼻梁左右五七下梳頭百餘梳散發臥熱寢至明上其法至簡易惟在常久不廢即有深功且試行二十日精神自已不同覺臍下實熱腰腳輕快面目有光久久不已去仙不遠當常習閉息使漸能持久以脈候之五至為一息某近來閉得漸久每一閉百二十至而開蓋已閉得二十餘息也又不可強閉多時使氣錯亂奔突而出反為害也慎之慎之又須常節晚食令腹中寬虛氣得回轉晝日無事亦時時閉目內觀漱煉津液咽之摩尉耳目以助真氣但清靜專一即易見功矣神仙至術有不可學者三一急躁二陰險三貪欲公雅量清德無此三疾竊謂可學故獻其區區若篤信力行他日相見復陳其妙者方書口訣多奇詞隱語卒不見下手門路今直指精要可謂至言不煩長生之根本也幸深加寶祕勿使淺妄者窺見以泄至道為祝神倦補益王倪丹砂無所不主尤補心益心血愈痰疾壯筋骨久服不死王倪者丞相遵十二代孫文明九年為滄州無棣令有桑門善相人知死期無不驗見倪曰公死明年正月乙卯倪以為妄囚之又使驗邑人之言死者數輩皆信倪乃出桑門禮謝之日為死計忽有人不言姓名謂倪曰知公憂死我有藥可以不死公能從我授乎倪再拜稱幸乃出煉丹砂法餌之過明年正月乃復召桑門視之桑門駭曰公必遇神藥面有異色且不死開元元年倪妻之弟亦遇異人授以杏丹法曰吾聞王倪能煉丹砂願以此易之以杏丹賜其子辨而倪與授杏丹者後皆仙去刺史李休光表聞賜其第為道觀開元十二年上東封泰山拜辨左散騎常侍隱遁不知所終此舊傳也光明辰砂二十八兩甘草二大兩遠志二大兩去心稱檳榔二大兩訶黎勒皮二大兩紫桂肉八大兩桂一半留蒸丹砂時拍碎用覆藉上甘草等四味銼碎以二大斗釜用細布囊盛丹砂懸於釜中著水和藥炭火煮之第一日兼夜用陰火水紋動第二日兼夜用陽火魚眼沸第三日兼夜用木火動花洣沸第四日兼夜用火火汩汩沸第五日兼夜用土火微微沸第六日兼夜用金火沸乍緩乍急第七日兼夜用水火緩調調沸先期泥二釜常暖水用添煮藥釜水涸即添暖水常令不減二斗七日滿即出丹砂於銀閣中蒸其閣中先布桂肉一兩拍碎即勻布丹砂又以余桂一兩覆之即下合置甑中先布糯米厚三寸乃置合又以糯米擁蓋上亦令上米厚三寸許桑薪火蒸之每五日換米換桂其甑蔽可用莞竹子為之不爾蒸久甑墮下釜中也甑下側開一小孔子常暖水用小竹子注添釜中勿令水減第一五日用春火如常炊飯兼夜第二五日兼夜用夏火猛於炊飯第三五日兼夜用秋火似炊飯乍緩乍急四五日兼夜用冬火火緩於炊飯依五行相生用文武火助之藥成即出丹砂以玉磓力士鉢中研之當不磣如粉如面可服之以穀子煎丸如梧桐子大每日食上服一丸每日三食服三丸非頓服三丸煉成丹砂二十兩為一大劑二年服盡後每十年即煉服三兩仍取正月一日起服三月使盡既須每十年三兩不可旋合當宜頓煉取一劑藏貯隨時服之其辰砂須是上等穀子煎法取赤穀子熟時絞汁煎如稠餳可用和丹砂如無穀子穀皮亦得凡服丹砂忌一切魚肉塵宿生冷蒜尤忌生血物及見血穢江陰葛侍郎中年病足幾廢久治不瘥得此服遂愈而輕健過於少時年八十餘飲啖視聽不衰寶此方未嘗傳人豫治平中感足疾萬端求得之然遊宦竟今未曾得為之又太醫孫用和亦嘗得此方仁宗時表獻之其大概雖相似然甚粗略非真方也書辟穀說洛下有洞穴深不可測有人墮其中不能出飢甚見龜蛇無數每旦輒引首東望吸初日光咽之其人亦隨所向效之不已遂不復飢身輕力強後卒還家不食不知其所終此晉武帝時事辟穀之法以百數此為上妙法止於此能復玉泉使鉛汞具體去仙不遠矣此法甚易知易行天下莫不能知知者莫能行何則虛一而靜者世無有也元符二年儋耳米貴吾乃有絶糧之憂欲與過子共行此法故書以授之四月十九日記陽丹訣冬至後齊居常吸鼻液漱煉令甘乃咽下丹田以三十瓷器皆有蓋溺其中已隨手蓋之書識其上自一至三十置淨室選謹朴者守之滿三十日開視其上當結細砂如浮蟻狀或黃或赤密絹帕濾取新汲水淨淘澄無數以穢氣盡為度淨瓷瓶合貯之夏至後取細研棗肉丸如梧桐子大空心酒吞下不限丸數三五日後取盡夏至後仍依前法採取卻候冬至後服此名陽丹陰煉須清淨絶欲若不絶欲真砂不結陰丹訣取首生男子之乳父母皆無疾恙者養其子善飲食之日取其乳一升只半升以來亦可又以硃砂銀作鼎與匙如無硃砂銀山澤銀亦得慢火熬煉不住手攪如淡金色可丸即丸如梧桐子大空心酒吞下亦不限丸數此名陰丹陽煉世人亦知服秋石然皆非清淨所結又此陽物也須復經火經火之餘皆其糟粕與燒鹽無異也世人亦知服乳陰物不經火煉則冷滑而漏精氣也此陽丹陰煉陰丹陽煉蓋道士靈智妙用沉機捷法非其人不可輕泄慎之秋石方凡世之煉秋石者但得火煉一法而已此藥須兼用陰陽二石方為至法今具二法於後凡火煉秋石陽中之陰故得火而凝入水則釋然消散歸於無體蓋質去但有味在此離中之虛也水煉秋石陰中之陽故得水而凝遇暴潤千歲不變味去而質留此坎中之實二物皆出於心腎二臟而流於小腸水火二臟螣蛇元武正氣外假天地之水火凝而為體服之還補太陽相火二臟為養命之本具方如後陰煉法小便三五石夏月雖腐敗亦堪用置大盆中以新水一半以上相和旋轉攪數百匝放令澄清闢去清者留濁腳又以新水同攪水多為妙又澄去清者直候無臭氣澄下秋石如粉即止暴乾刮下如膩粉光白粲然可愛都無氣臭味為度再研以乳男子乳和如膏烈日中暴乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即丸之如梧桐子大曝乾每服三十丸溫酒吞下陽煉法小便不計多少大約兩桶為一擔先以清水挼好皂角濃汁以布絞去滓每小便一擔桶入皂角汁一盞用竹篦急攪令轉百千遭乃止直候小便澄清白濁者皆碇底乃徐徐撇去清者不用只取濁腳並作一滿桶又用竹篦子攪百餘匝更候澄清又撇去清者不用十數擔不過取得濃腳一二斗其小便須是先以布濾過勿令有滓取得濃汁入淨鍋中煎乾刮下搗碎再入鍋以清湯煮化乃於筲箕內丁淋下清汁再入鍋熬干又用湯煮化再依前法丁淋如熬干色未潔白更准前丁淋直候色如霜雪即止乃入固濟砂盒內歇口火煅成汁傾出如藥未成窩更煅一兩度候瑩白五色即止細研入砂盒內固濟頂火四兩養七晝夜久養火尤善再研每服二錢空心溫酒下或用棗肉為丸如梧桐子大每服三十丸亦得空心服陽煉日午服陰煉夜半服廣南有一道人惟與人煉秋石為業謂之還元丹先大夫曾得瘦疾且嗽凡九年萬方不效服此而愈郎侍郎簡師南海其室病久夜夢神人告之曰有沈殿中攜一道人能合丹可愈汝疾宜求服之空中擲下數十粒曰此道人丹也及旦臥席上得藥十餘粒正如夢中所見及先大夫到番禺郎首問此丹先大夫乃出丹示之與夢中所得不異妻服之即愈又豫族子嘗病顛眩腹鼓久之漸加喘滿凡三年垂困亦服此而愈皆只是火煉者時豫守宣城亦大病逾年族子急以書勸豫服此丹雲實再生人也豫方合煉適有一道人又傳陰煉法二法相兼其藥能動人骨髓無所不至極祕其術久之方許傳依法服之又驗此藥不但治疾可以常服有功無毒豫始得之甚艱意在救濟人理不當祕火煉秋石人皆能之煎煉時須大作爐鼎煎煉數日臭達四鄰此法極省力只一小鍋便可煉體如金石永不暴潤與常法功力不侔久疾人只數服便效豫偶得之極為神妙金丹訣用物之精取物之華集我丹田我丹所家我丹伊何鉛汞丹砂客主相守如巢養鴉種以戊已耕以亦蛇養以丙丁灌以河車乃根乃株乃蕊乃花晝煉於火赫然彤霞夜浴於水皓然素葩金丹自成日思無邪龍虎鉛汞說人之所以生死未有不自坎離者坎離交則生分則死必然之道也離為心坎為腎心之所然未有不正雖桀跖亦然其所以為桀跖者以內輕而外重故常行其所不然者爾腎強而溢則有欲念雖堯顏亦然其所以為堯顏者以內重而外輕故常行其所然者爾由此觀之心之性法而正腎之性淫而邪水火之德固如是也子産曰火烈人望而畏之水弱人狎而玩之達者未有不知此者也龍者汞也精也血也出於腎而肝藏之坎之物也虎者鉛也氣也力也出於心而肺主之離之物也心動則氣隨之而作腎溢則精血隨之而流如火之有煙熖未有復反於薪者也世之不學道者其龍常出於水故龍飛而汞輕其虎出於火故虎走而鉛枯此生人之常理也順此者死逆此者仙故真人之言曰順行則為人逆行則為道又曰五行顛倒術龍從火里出五行不順行虎向水中生有隱者教豫曰人能正坐瞑目調息握固心定微息則徐閉之達磨胎息法亦須閉若此佛經待其自止恐卒不能到也雖無所念而卓然精明毅然剛烈如火之不可犯息極則小通之微則復閉之方其通時亦須一息一息掃之下丹田為之惟數以多為賢以久為功不過十日則丹田溫而水上行愈久愈溫幾至如烹上行水翕然如雲蒸於泥丸蓋離者麗也著物而見火之性也吾目引於色耳引於聲口引於味鼻引於香火輒隨而麗之今吾寂然無所引於外火無所麗則將安往水者其所妃也勢必從之坎者陷也物至則受水之性也而況其配乎水火合則火不炎而水自上則所謂龍從火里出也龍出於火則龍不飛而汞不幹旬日之外腦滿而腰足輕方閉息時常捲舌而上以舐縣雍雖不能而意到焉久則能也如是不已則汞下入口方調息時則漱而烹之須滿口而後咽若未滿且留口中俟後次也仍以空氣送至丹田常以意養之久則化而為鉛此所謂虎向水中生也此論奇而通妙而簡決為可信者然吾有大患平生髮此志願百十回矣皆繆悠無成意此道非捐軀以赴之刳心以受之盡命以守之不能成也吾今年已六十名位破敗兄弟隔絶父子離散身居蠻夷北歸無日區區世味亦可知矣若復繆悠於此真不如人矣故數日來別發誓願譬如古人避難窮山或使絶域齧草啖雪彼何人哉已令造一禪榻兩大案明窗之下即專欲治此並已作干蒸餅百枚自二月一日為首盡絶人事飢則食此餅不飲湯水不啖他物細嚼以致津液或飲少酒而已午後略睡一更臥三更乃起坐以達旦有日採日有月採月余時非數息煉陰則行今所謂龍虎訣耳如此百日或有所成不讀書不看經且一時束起以待異日不遊山水除見道人外不接客不會飲皆無益也深恐易流之性不能終踐此言故先作書以報庶幾他日有慚於弟而不敢變也此事大難不知其果然能不慚否此書既以自堅又欲以發弟也養舌以舐縣雍近得此法初甚祕惜云此禪家所得向上一路千金不傳人之所見如此雖可笑然極有驗也但行之數日間舌下筋微急痛當以漸馴致若舌尖果及懸雍則致華池之水莫捷於此也又言此法名洪爐上一點雪宜祕之記丹砂爾朱道士晚客於眉山故蜀人多記其事目言受記於師云汝後遇白石浮當飛仙去爾朱雖以此語人亦莫識所謂後去眉山乃客於涪州愛其所産丹砂雖瑣細面皆矢鏃狀瑩徹不雜土石故止煉丹數年竟於涪之白石縣仙去乃知師所言不謬吾聞長老道其事多然不記其名字可恨也本草言丹砂出符陵谷陶隱居云符陵是涪州今無復採者吾聞熟涪者云採藥者時復得之但時方貴辰錦砂故此不堪採耳讀本草偶記之記松丹砂祥符東封有扈駕軍士晝臥東嶽真君觀古松下見松根去地尺余有補塞處偶以所執兵攻刺之塞者動有物如流火自塞下出遙走入地中軍士以語觀中人有老道士拊膺曰吾藏丹砂於是三十年矣方卜日取之因掘地數丈不復見道士悵恨成疾竟死其法用硃砂精良者鑿大松腹以鬆氣煉之自然成丹吾老矣不暇為此當以山澤銀為鼎有蓋擇砂之良者二斤以松根明節懸胎煮之傍置沙瓶煎水以補耗滿百日取砂玉磓研七日投熟蜜中通油瓷瓶盛日以銀器取少許醇酒攪湯飲之當有益也
