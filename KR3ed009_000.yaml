front:
  text: 原序豫嘗論治病有五難辨疾治疾飲藥處方別藥此五也今之視疾者惟候氣口六脈而已古之人視疾必察其聲音顏色舉動膚理性情嗜好問其所為考其所行已得其大半而又遍診人迎氣口十二動脈疾發於五臟則五色為之應五聲為之變五味為之偏十二脈為之動求之如此其詳然而猶懼失之此辨疾之難一也今之治疾者以一二藥書其服餌之節授之而已古以治疾者先知陰陽運歷之變故山林川澤之竅發而又視其人老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜或藥或火或刺或砭或湯或液矯易其故常捭摩其性理搗而索之投幾順變間不容髮而又調其衣服理其飲食異其居處因其情變或治以天或治以人五運六氣冬寒夏暑晹雨電雹鬼靈魘蠱甘苦寒溫之節後先勝負之用此天理也盛衰強弱五臟異稟循其所同察其所偏不以此形彼亦不以一人例衆人此人事也言不能傳之於書亦不能喻之於口其精過於承蜩其察甚於刻棘目不捨色耳不捨聲手不釋脈猶懼其差也授藥遂去而希其十全不亦難哉此治疾之難二也古之飲藥者煮煉有節飲啜有宜藥有可以久煮有不可以久煮者有宜熾火有宜溫火者此煮煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也此服藥之難三也藥之單用為易知藥之復用為難知世之處方者以一藥為不足又以衆藥益之殊不知藥之有相使者相反者有相合而性易者方書雖有使佐畏惡之性而古人所未言人情所不測者庸可盡哉如酒於人有飲之逾石而不亂者有濡吻則顛眩者漆之於人有終日搏漉而無害者有觸之則瘡爛者焉知藥之於人無如此之異者此稟賦之異也南人食豬魚以生北人食豬魚以病此風氣之異也水銀得硫黃而赤如丹得礬石而白如雪人之欲酸者無過於醋矣以醋為未足又益之以橙二酸相濟宜其甚酸而反甘巴豆善利也以巴豆之利為未足而又益之以大黃則其利反折蟹與柿嘗食之而無害也二物相遇不旋踵而嘔此色為易見味為易知而嘔利為大變故人人知之至於相合而知他藏致他疾者庸可易知耶如乳石之忌參朮觸者多死至於五石散則皆用參朮此古人處方之妙而世或未喻也此處方之難四也醫誠藝也方誠善也用之中節也而藥或非良奈何哉橘過江而為枳麥得濕而為蛾雞逾嶺而黑鸜鵒逾嶺而白月虧而蚌蛤消露下而蚊喙坼此形器之易知者也性豈獨不然乎豫觀越人藝茶畦稻一溝一隴之異遠不能數步則色味頓殊況藥之所生秦越燕楚之相遠而又有山澤膏瘠燥濕之異稟豈能物物盡其所宜又素問説陽明在天則花實戕氣少陽在泉則金石失理如此之論採掇者固未嘗晰也抑又取之有早晚藏之有焙朗風雨燥濕動有稿暴今之處藥或有惡火者必日之而後咀然安知採藏之家不常烘煜哉又不能必此辨藥之難五也此五者大概而已其微至於言不能宣其詳至於書不能載豈庸庸之人而可以易言醫哉豫治方最久有方之良者輒為疏之世之為方者稱其治效嘗喜過實千金肘後之類猶多溢言使人不敢覆信豫所謂良方者必目睹其驗始著於篇聞不預也然人之疾如向所謂五難者方豈能必良哉一賭其驗即謂之良殆不異乎刻舟以求遺劍者豫所以詳著其狀於方尾疾有相似者庶幾偶值云爾篇無次序隨得隨注隨以與人極道貴速故不暇待完也沈括序蘇沈內翰良方序一沈公內翰字存中博古通今古君子也留心醫書非所好也實有補於後世爾公凡所至之處莫不詢究或醫師或里巷或小人以至士大夫之家山林隱者無不求訪及一藥一術皆至誠懇切而得之終不以權勢財貨逼而得之可見其愛物好生之理也公集而目之曰良方如古之良醫者若孫真人未嘗不以慈悲方便救護為念也近世有人或得一方小小有效則其莫得之此亦為衣食故也若夫腰金佩玉出權貴之門又安敢望其面目乎余得此方十有餘年恨篋無金帛而能成就一板使流傳天下後世療夫久疾瘎疴纏綿之苦者也豈自言微功有所利也然此方經驗有據始敢鏤行永嘉金門羽客林靈素序蘇沈內翰良方序
