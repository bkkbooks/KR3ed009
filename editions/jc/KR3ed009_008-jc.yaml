body:
  text: 卷第八治水氣腫滿法張微之屢驗生商陸切作豆大赤小豆等分鯽魚三尾去腸存鱗上二物實魚腹內取線縛水三升緩煮赤豆爛取去魚只取二物空腹食之以魚汁送下不汗則利即瘥甚者過二日再為之不過三劑微之家乳姥病水飲一劑愈博濟治水氣逐氣散白商陸根去粗皮薄切陰乾或曬乾上為末黃顙魚三尾大蒜三瓣綠豆一合水一升同煮以豆爛為度先食豆飲汁送下又以汁下藥末二錢水化為氣內消省郎王申病水氣四體悉滿不能坐臥夜倚壁而立服一劑頓愈治小腸氣二姜散高良薑乾薑等分炮八分留二分上一大錢用續隨子去皮細研紙裹出油取白霜入一字將熱酒一盞入豬膽汁十數滴同調一服瘥川楝散治小腸氣下元閉塞不通川楝子一兩和皮四片巴豆一兩並殼捶令碎上同和勻入銚內炒令紫色取出去巴豆只取川楝子淨刷為末每服一錢先炒茴香秤一錢令香用酒一盞沖更煎三五沸去滓調川楝子末連進二服得下泄即瘥此方同治遠年內外臁瘡方於建安軍人吳美得之治小腸氣倉卒散方山梔子四十九枚燒半過附子一枚炮上每服二錢酒一小盞煎至七分入鹽一捻溫服脾腎氣攣急極痛不可屈伸腹中冷重如石痛不可忍白汗如瀉手足冰冷久不瘥臥欲死者服此藥一劑忽如失去甚者兩服瘥予自得效亦屢以治人皆驗治小腸氣斷弓弦散五靈脂蒲黃等分上二錢先用釅醋一合熬藥成膏以水一小盞煎至七分熱呷此又名失笑散療婦人血氣尤驗曾有婦人病心腹痛欲死十餘日百藥不驗服此頓愈治痢芍藥散茱萸炒半兩黃連炒赤芍藥各一兩上三味水煎服治痢四神散乾薑黃連當歸黃柏皆炒等分上為末烏梅一個煎湯調下二大錢水瀉等分赤痢加黃蘗白痢加姜後重腸痛加黃連腹中痛加當歸並空心食前服予家常作此藥夏月最獲用大凡泄痢宜食酸苦忌甘鹹蓋酸收苦堅甘緩咸濡不可不知也陳應之療痢血方丞相曾魯公痢血百餘日國醫無能療者應之取鹽水梅除核研一枚合蠟茶加醋湯沃服之一啜而瘥又丞相莊肅梁公亦痢血應之曰此授水穀當用三物散亦數服而愈三物散用胡黃連烏梅肉灶下土等分為末臘茶清調下食前空腹溫服樗根散水瀉裡急後重數走圊樗根皮一兩枳殼半兩甘草一分炙上粥飲下二錢食前一服止藥歌並引眉山蘇子瞻撰嵇中散作幽憤詩知不死矣而卒章乃曰采薇山阿散發岩岫永嘯長吟頤神養壽者悼此志之不遂也司馬景王既殺中散而悔使悔於未殺之前中散得免於死者吾知其掃跡屏影於人間如脫兔之投林也采薇散發豈所難哉孫真人著大風惡疾論神仙傳有數人皆因惡疾而得仙道何者割棄塵累懷穎陽之風所以因禍而取福也吾始得罪遷嶺表不自意逾年無後命知不死矣然舊苦痔疾至是大作呻呼幾百日地無醫藥有亦不效道士教吾去滋味絕葷血以清淨勝之痔有蟲館於吾後滋味葷血既以自養亦以養蟲自今日以往旦暮食淡面四兩猶復念食則以胡麻茯苓抄足之飲食之外不啖一面物主人枯槁則客自棄去尚恐習性易流故取中散真人之言對症為藥使人誦之曰東坡居士汝忘逾年之憂百日之苦乎使汝不幸有中散之禍伯牛之疾雖願采薇散發豈可得哉今食麥麻茯苓多矣居士則以歌答之云百事治兮味無味之味五味備兮茯苓麻麥有時而匱兮有即食無即已者與我無既兮嗚呼館客終不以是為愧兮治腸痔下血如注水不瘥者上件唯用市河中水每遇更衣罷便冷沃之久沃為佳久患者皆瘥予始得於信州侯使君曰沃之兩次即瘥予用之亦再沃而瘥並與數人用皆然神奇可驚不類他藥無河水井水亦可治小便不通琥珀研成粉每服二錢煎萱草根濃汁調下空心服予友人曾小腸秘甚成淋每旋只一二滴痛楚至甚用惡藥逐之皆不通王郇公與此藥一服遂通人有病痔腸腫因不能尿候如淋疾他藥不能通惟此法可治治小便數方並治渴上取純糯米糍一手大臨臥炙令軟熟啖之以溫酒送下不飲酒入溫湯下多啖彌佳行坐良久待心間空便睡一夜十餘行者當夜便止予嘗以為戲術與人賭物用之如有神聖或言假火氣溫水送不然也大都糯稻主縮水凡人夜飲酒者是夜輒不尿此糯米之力也又記一事予故人劉正夫罷官閩州次建溪常叩一大家求舍閉門不納既而使人謝云屬其父有病甚不能延客劉問其狀曰病渴殆死矣劉許為其營藥俄而其子弟群至求治其父劉即燒藥與之明目來謝云飲藥一杯是夜啜水減七八分此劉君目擊者其方用糯稻稈斬去穗及根取其中心淨器中燒作灰每用一合許湯一碗沃浸良久澄去滓嘗其味如薄灰汁乘渴頓飲之此亦糯稻縮水之一驗也故因附此治夢中遺泄茯苓散堅白茯苓為末每服五錢溫水調下空心食前臨臥服一日四五服方書言夢泄皆云腎虛但補腎澀精然亦未嘗有驗予論之此疾有三證一者至虛腎不能攝精心不能攝念或夢而泄或不夢而泄此候皆重須大服補藥然人病此者甚少其餘皆只是心虛或心熱因心有所感故夢而泄此候瘥輕人之患者多是此候但服茯苓散自瘥予累以拯人皆良驗又有少年氣盛或鰥夫道人強制情欲因念而泄此為無病醫及攝生家言夢寐甚於房勞此殆不然予嘗驗之人之病天行未復而犯房勞者多死至於夢寐則未嘗致困此決然可知但夢寐自有輕重耳療寸白蟲錫沙作銀泥者即以黃丹代油和梧桐子大蕪荑檳榔二物等分為散上煎石榴根濃汁半升下散三錢丸五枚中夜服旦日下予少時病白蟲始則逾粳米數歲之後遂長寸余古說蟲長盈尺人即死以藥攻之下蟲數合或如帶長丈餘蟠蜒如豬臟熠熠而動其末寸斷輒為一蟲蟲去病少以後數月復如初如是者數四後得此方服之蟲悉化為水自此永斷
