body:
  text: 卷第十澤蘭散治婦人產乳百疾治婦人產乳百疾安胎調氣產後血暈衄血血積虛勞無子有子即墮難產子死腹中胎衣不下婦人血注遍身生瘡經候不調赤白帶下乳生惡核咳嗽寒熱氣攻四肢處女任脈不調等常服益血美飲食使人安健有子澤蘭散澤蘭嫩葉九分石膏八分研當歸赤芍藥川芎微炒甘草炙白蕪荑各七分生乾地黃六分肉桂五分厚朴姜炙桔梗吳茱萸炒卷柏並根防風白茯苓柏子仁細辛各四分人參白朮米泔浸一宿切麩炒黃色白芷炒藁本椒紅乾薑炒烏頭炮黃耆五味子各三分白薇丹參阿膠炒乾各二分上為細末空心熱酒調下二錢予家婦人女子羸弱多疾者服此藥悉瘥往往有子朱賁琥珀散治婦人血風勞琥珀沒藥木香當歸芍藥白芷羌活乾地黃延胡索川芎各半兩土苽根牡丹皮白朮桂各一兩上件為末每服二錢水一盞煎至七分益酒三分復煎少時並滓熱服重疾數服則知效麥煎散治少男室女骨蒸婦人血風攻疰四肢心胸煩壅鱉甲醋炙大黃濕紙裹煨熟常山柴胡赤茯苓當歸酒浸一宿干生漆白朮石膏乾生地黃各一兩甘草炙半兩上為末每服二錢小麥五十粒水一盞煎至六分食後臥時溫服有虛汗加麻黃根一兩此黃州吳判官方療骨熱黃瘦口臭肌熱溢汗極效麥煎散甚多此方吳君寶之如希世之珍其效可知治婦人妊娠傷寒白朮散白朮黃芩等分新瓦上同炒香上為散每服三錢水一中盞生薑三片大棗一個擘破同煎至七分溫服但覺頭痛發熱便可二三服即瘥唯四肢厥冷陰證者未可服此方本常州一土人賣此藥醫皆論斤售去行醫用之如神無人得其方予自得此治疾無有不效者仍安胎益母子肉桂散出靈苑治產後眾疾血氣崩運腫滿發狂瀉痢寒熱等唯吐而瀉者難瘥黑豆二兩炒熟去皮肉桂當歸酒浸芍藥乾薑炮乾地黃甘草蒲黃紙包炒共為末各一兩上溫酒調下二錢日三服疾甚者三服無疾二服七日止大黃散出靈苑治產後血暈及傷折內損婦人血症血瘕羊脛炭燒赤酒淬十過五兩大黃小便浸七日日一易以濕紙裹煨切焙巴豆肉漿水煮黃色焙各三兩半古銅錢用半兩錢燒赤米醋淬為粉新水飛過去粗取細者二兩上和研一日每服半錢當歸一分小便煎濃稍溫調下產後血暈百病且當逐血者至甚乃服口噤者挖開灌下候識人更一服累經生產有血積症癖塊及敗血風勞寒熱諸疾當下如爛豬肝片永無他疾墜擊內損當歸酒下一字醫潘步墜下折脅當折處陷入肌中痛不可忍服此藥如神以手自內拓之筋骨遂平治小兒諸方黑神丸治小兒急驚慢驚風膩粉一錢半黑土白麵蘆薈炙一錢麝香龍腦牛黃青黛使君子去殼麵裹煨熟各五分上面糊丸梧桐子大每服半丸薄荷湯研下要利即服一丸楚州小兒醫王鑑賣此藥致厚產鑑神之未嘗傳人予得之乃常人家睡驚丸小不同耳治驚風極效前後用之垂死兒一服即瘥治褓中小兒臍風撮口法上視小兒上下斷及當口中心處若有白色如紅豆大此病發之候也急以指爪正當中掏之自外達內令斷微血出亦不妨又與白處兩盡頭亦依此掏令內外斷只掏令氣脈斷不必破肉指爪勿令大銛恐傷兒甚予為河北察訪使日到趙郡有老人來獻此法云篤老惜此法將不傳願以濟人詢之趙人云此翁平生手救千餘兒矣此翁治兒應手皆效青金丹治小兒諸風諸疳諸痢出博濟方青黛三分研雄黃研胡黃連各二分硃砂研膩粉熊膽溫水化白附子蘆薈研各一分麝香半分研蟾酥水銀各皂子大鉛霜龍腦各一字上同入乳缽內再研令勻用獖豬膽一枚取汁熬過浸蒸餅少許為丸黃米大曝乾一歲可服二丸量兒大小增之驚風諸癇先以一丸溫水化滴鼻中令嚏戴目者當自下瘛瘲亦定更用薄荷湯下諸疳粥飲下變蒸寒熱薄荷湯化下諸瀉痢米飲下疳蛔咬心苦楝子煎湯下鼻下赤爛口齒疳蟲口瘡等乳汁研塗病疳眼雀目白羊子肝子一枚竹批開內藥肝中以麻縷纏米泔煮令熟空腹服乳母當忌毒魚大蒜雞鴨豬肉此丸療小兒諸疳至良予目見小兒病疳瘠盡但粗有氣服此或下蟲數合無不即瘥而肥壯無疾幾能再生小兒也桔梗散治小兒風熱及傷寒時氣瘡疹發熱等桔梗細辛人參白朮栝蔞根甘草白茯苓川芎各等分上為末服二錢水一盞姜一片薄荷二葉同煎二歲以下兒作四五服五歲以上分二服予家嘗作此藥凡小兒發熱不問傷寒風熱先與此散數服往往輒愈兼服小黑膏尤善小黑膏藥治小兒傷寒風癇天南星一枚大者燒通赤入小瓶內濕紙密口令火滅取刮之中心存白處如皂角子大為度須燒數枚擇其中度可用者烏頭一枚薄荷一握元參五錢各為末上為末蜜和蔥白湯下豆許頻服筋緩急加乳香同蔥白煎湯下潤州傅醫專賣此藥累千金予家小兒傷風發熱與二三丸令小睡及寤則已涼矣治痘瘡無瘢豆瘡欲無瘢頻揭去痂勿令隱肌乃不成瘢縱揭傷有微血但以面膏塗無苦也瘡家不可食雞鴨卵即時盲瞳子如卵色其應如神不可不戒也治瘡疹欲發及已發而陷伏者皆宜速治不速毒入臟必致困宜服此豬血臘月取瓶盛掛風處令乾上取半棗大加龍腦大豆許溫酒調下潘醫加綠豆英粉半棗塊同研病微有即消甚則瘡發愈予家小女子病傷寒但腹痛甚晝夜號呼手足厥冷漸加昏困形症極惡時例發瘡子予疑甚為醫以藥伏之先不畜此藥急就屠家買少生血時盛暑血至已敗惡無可奈何多以龍腦香和灌之一服遂得少睡須臾一身皆瘡點乃安不爾幾至不救辰砂丸治小兒驚熱多涎痰瘧久痢吐乳午後發熱驚癇等疾辰砂粉霜膩粉各一分生龍腦一錢上軟糯米飯為丸綠豆大一歲一丸甘草湯下大人七丸治小兒豌豆瘡入目痛楚恐傷目浮萍陰乾上每服一二錢隨兒大小以羊子肝半個入盞子內以杖子刺碎爛投水半合絞取肝汁調下食後服不甚者一服瘥已傷目者十服瘥邢杜醫用此藥前後效者甚多麝香散治小兒走馬疳牙齦腐爛惡血口臭牙齒脫落黃連末三錢銅綠麝香各一錢水銀一錢煮棗肉一枚同研右漱口淨以藥敷瘡上蘭香葉覆之內蝕為坎者一敷即生肉治小兒走馬疳唇齒瘡爛逡巡狼狽用此即瘥砒霜粉霜二味先研極細石灰羅過研上等分相合左右轉研多千下當極細如面每以雞翎摭少許掃瘡上其瘡即干慎勿多用恐入腹中有大毒慎之海州東海縣民家賣此藥每一病只一掃如米許大無不瘥者牛黃煎治小兒諸疳諸痢食傷氣脹體羸頭大頭髮作穗壯熱不食多困齒爛鼻瘡丁奚潮熱等疾大蚵蚾一枚去皮骨腹胃炙為末以無灰酒一盞獖豬膽一枚同熬成膏訶子炮使君子胡黃連蟬殼不洗墨石子蘆薈蕪荑熊膽硃砂夜明砂雄黃各一分研木香肉豆蔻春夏各半分秋冬各一分牛黃二錢麝香一錢龍腦五分上為丸如麻子大飲下五七丸驚疳金銀薄荷湯下肝疳腹脹桃仁茴香湯下疳蟲東引石榴苦楝根湯下五歲以上十丸此藥尤治疳痢協熱而痢者不可服田季散治久患翻胃及小兒驚吐諸吐並醫好硫黃半兩細研水銀一分與硫黃再研無星上同研如黑煤色每服三錢生薑四兩取汁酒一盞同薑汁煎熟調藥空心服衣被蓋覆當自足指間汗出迤邐遍身汗出即瘥常有人病反胃食輒吐出午後即發經三年不瘥國醫如孫兆輩皆治療百端無驗消羸殆盡枯黑骨立有守庫卒季吉者見之曰此易治也一服藥可瘥始都不信之一日試令合藥與少錢市藥僕次日持藥至止一服如法服之汗出皆如膠腥穢不可近當日更不復吐遂瘥楚人田醫善治小兒諸吐亦用此藥量兒長少服一錢至一字冷水調下吐立定此散極浮難調須先滴少水以至緩緩研殺稍稍增湯使令調和若頓入湯酒盡浮泛不可服又予舊官屬陳宣德之妻病翻胃亦彌年得一烏頭散服之一服瘥又楚人孫生有一茱萸丸亦療翻胃其人自有傳今皆附於此予校此三方惟田季有陰陽理自勝捷烏頭茱萸二方皆性熱用者更量其臟寒溫投之烏頭散烏頭三兩炮去皮川楝子一兩半檳榔木香各一兩上為末每服二錢水一盞煎至七分鹽一捻溫服茱萸丸孫生傳曰年深膈氣翻胃飲食之物至晚皆吐出悉皆生存不化鬲上常有痰涎時時嘔血胸中多酸水吐清水無時夜吐輒至晚日漸羸瘦腹中痛楚時復冷滑或即閉結候狀不可盡述自患此疾六年日可吐及五七度百方無驗因遇此法服及兩月諸疾悉瘥嘗願流傳救人其方如下茱萸三分瓦上出油胡椒人參當歸各五錢甘草半兩一半生一半紙裹五七重醋浸令透火內慢煨乾又浸如此七遍半夏一兩用姜四兩研汁入砂罐子內用薑汁井水煮候破看存二分白心取半夏研為膏子白礬半兩炒乾存性一分上為末半夏膏丸如稍梗添薑汁丸如梧桐子大每服七丸桑柳條各入最上等銀器內煎湯吞下日三服忌諸毒物惟可食油豬胰脾軟飯此孫生自敘如此吳婆散治小兒疳瀉不止日夜遍數不記漸漸羸瘦眾藥不效者黃柏蜜炙黃連微炒桃根白皮各一分木香厚朴薑汁炙丁香檳榔各一錢蕪荑去皮一分沒石子一錢半楝根白皮半分上為末每服一字三歲以上半錢五六歲一錢用紫蘇木瓜米飲調下乳食前一日三服予家小兒曾有患瀉百餘日瘦但有皮骨百方不瘥有監兵鍾離君見之曰何不服吳婆散立可瘥也予因問吳婆散何藥曰古方也人家多有之乃問求方合與兩三服便效又一孫男亦疳瀉勢甚危困兩服遂定若病深者服一兩日間決瘥此藥若是疳瀉無不驗者藥性小溫暴熱瀉者或不相當寒水石散治小兒之病多因驚則心氣不行鬱而生涎逆為大疾宜服常行小腸去心熱兒自少驚亦不成疾寒水石滑石水研如泔揚去粗者存細者瀝乾更研無聲乃止各三兩甘草粉一兩生上量兒大小熱月冷水下寒月溫水下凡被驚及心熱不可安臥皆與一服加龍腦更良小朱砂丸出博濟方治小兒驚積鎮心化涎硃砂一分巴豆三十粒去皮膜出盡油半夏湯洗七遍為末炒二錢杏仁五枚炮去皮尖上面糊丸如綠豆大二歲一丸荊芥薄荷湯下三歲二丸五歲三丸如驚伏在內即行盡仍舊藥出如無驚藥更不下妙香丸治小兒虛中積潮熱寒熱心腹脹滿痛疼者辰砂一兩牛黃生龍腦麝香各一分金箔十四片粉霜一錢膩粉一錢蠟二兩巴豆一百二十個肥大者上丸如彈子圓量虛實加減龍腦漿水下夜半後服臟虛即以龍腦米飲下每服三丸如小豆大藥勢緩即按令扁疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積丸如綠豆治小兒吐逆尤效此藥最下胸中煩及虛積治小兒臍久不幹赤腫出膿及清水出聖惠方當歸焙乾為末研細上著臍中頻用自瘥予家小兒常病臍濕五十餘日貼他藥皆不瘥聖惠方有十餘方從上試之至此方一敷而干後因尿入瘡皮復病又一貼愈治小兒熱嗽馬牙硝白礬各半斤黃丹一分上同研入合子固濟火燒令紅覆潤地一夜再研加龍腦半錢甘草湯下一字或半錢治小兒疳肥瘡多生頭上淫浸久不瘥及耳瘡等悉主之石錄白芷等分上以生甘草洗瘡敷藥一日愈雜記傳小說中有數方既著於書必有良驗今錄於此北夢瑣言記火燒瘡方法孫光顯家人作煎餅一婢抱孩子擁爐不覺落火爐之上遂以醋泥敷之至曉不痛亦無瘢痕是知俗說亦不厭多聞朝野僉載記毒蛇傷用艾炷當齧處灸引去毒氣即瘥其餘惡蟲所螫馬汗入瘡用之亦效又記筋斷須續者取旋覆根絞取汁以筋相對取汁塗而封之即相續如故蜀兒如逃走多刻筋以此續之百不失一廣五行記治噎疾永徽中絳州有僧病噎數年臨死遺命令破喉視之得一物似魚而有兩頭遍體悉是魚鱗致缽中跳躍不止以諸味置缽中悉化為水時寺中方刈藍作靛試取少靛置缽中此蟲繞缽畏避須臾蟲化為水世人以靛治噎疾國史補言有白岑者療發背其驗十全後為淮南十將節度使高適脅取其方然不甚效岑至九江為虎所食驛吏於囊中得其真方太原王升之寫以傳布後魯國孔南得岑方為王傳號靈方至今具於後呂君子西華洛陽人孤貧無家著作郎韋顒與其先有舊以其子妻之應秀才五舉不第與同志張元伯入王屋山時莫知之者俄而華疽發背膿血被身筋骨俱見告元伯曰吾將死矣扶至於水傍俟天命而已元伯無可奈何因從其言露臥數宿忽有一胡僧振錫而至視其瘡曰膜尚完可治也乃出閤中藥塗於軟帛上貼四五日生肌八九日肉乃平飲膳如故僧云吾將它適慮再發此疾無藥療因示其方令秘之西華頓首曰微吾師遺骸邱畝矣雖力未能報願少伸區區何遽言別乎僧曰始以君病而來今愈吾去矣安用報為乃去數步之間不復見西華歸以事白韋韋因請其方西華不與韋知其終不可得乃白於考功裴輝卿員外請以名第啖而取之裴如其言西華對曰愚修文以求名不沽方以求進竟下第而返後河南尹聞之謂韋曰有一計取之韋曰何計曰陷於法禁免其罪而購之逾月果罹其罪獄成引決親喻之令出其所秘方可以免雪西華守死無求免之色尹無奈何乃釋之西華知失考功之旨又見薄於外舅雖精苦日甚而文趣轉疏如是經五稔見黜於春官乃罷去薄遊梁宋間姨弟李潛尉商邱淹延半歲以酒肉過量疽復發既薦復以前方療之懼人知之憂疑阻喪久不能決潛知其意乃喻之曰聞有神授名方今病亟矣奈何懼潛見方之故忽死而不治豈保生承繼之意也西華不得已口授之潛欲審其事皆三反覆之及藥成潛親敷之尋疾平乃遊荊蠻不知所之潛於是手疏五十本遍遺親戚以矯西華之僻前潤州金壇縣尉得其方每貯其藥物嘗遊西蜀活將死者五六人每欲傳其事貽於後以家故行役未諧此意貞元十年冬十月偶於秋浦與霍願同詣周南宅夜話既久言及方書遂授之於周南令志之方曰此發背者自內而出外者也熱毒中膈氣血凝澀蒸背上虛處先三五日隱脈妨悶積漸成腫始出皮膚結聚成膿也其方如後白麥飯石顏色黃白類麥飯者尤佳炭火燒出醋中浸十遍止白蘞末與石等分鹿角二三寸截之不用自脫者元帶腦骨者即非自脫炭火燒煙盡為度杵為末依前二味上並搗細末取多年米醋於銚中煎令魚眼沸即下前件藥末調如稀餳以篦子塗敷腫上只當瘡頭留一指面地勿令合以出熱氣如未膿當內消若已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即布上塗藥貼之瘡上干即再換但以鬲中不穴無不瘥瘡切忌手觸宜慎之劉夢得傳信方亦出不如此之備北齊書楊遵彥患發背腫馬嗣明以煉石塗之便瘥其方取粗黃石如鵝卵大猛火令赤內釅醋中因有屑落醋中頻燒石盡取屑暴搗和醋塗於腫上與白岑方相類也獨異志唐貞觀中張寶藏為金吾衛士嘗因下直歸櫟陽路逢少年畋獵割鮮野食倚樹嘆曰張寶藏身年七十未嘗得一食酒肉如此者可悲哉旁有僧指曰六十日內官登三品何足難也言訖不見寶藏異之即時還京師時太宗苦於氣痢眾醫不效即下詔問殿廷左右有能治此疾者當重賞之寶藏曾困其疾即具疏乳煎蓽茇方上服之立瘥宣下宰臣與五品官魏徵難之逾月不進擬上疾復發問左右曰吾前服乳煎蓽撥有功覆命進一啜又平因思曰嘗令與進方人五品官不見除授何也徵懼曰奉詔之後未知文武二吏上怒曰治得宰相不妨已授三品官我天子也豈不及汝耶乃厲聲曰與三品文官授鴻臚寺卿時正六十日矣其方每服用牛乳半斤蓽茇三錢匕同煎減半空心頓服馬提刑記醫先祖忠肅公天聖中以工部尚書知濠州家有媼病漏蓋十餘年一日老兵掃庭下且言前數日過市有醫自遠來道瘡漏可治特頃刻之力耳媼曰吾更醫多矣不信也其黨有以白忠肅公者即為召醫視之曰可治無疑須活鱔一竹針五七枚醫乃擲鱔於地鱔因屈盤就盤以竹針貫之覆瘡良久取視有白蟲數十如針著鱔醫即令置杯中蠕動如線復覆之又得十餘枚如是五六醫者曰蟲固未盡然其餘皆小蟲竟請以常用藥敷之時家所有檳榔黃連為散敷之醫未始用藥明日可以干艾作湯投白礬末二三錢洗瘡然後敷藥蓋老人血氣冷必假艾力以佐陽而艾性亦能殺蟲也如是者再即生肌不一月當愈既而如其言醫曰瘡一月不治則有蟲蟲能蠕動氣血亦隨之故瘡漏不可遽合則結痛實蟲所為又曰人每有疾經月不痊則必憊虛勞婦人則補脾血小兒則防驚疳二病則並治瘴癘醫無名於世而治疾有效亦良醫也又其言有理故並錄之子瞻雜記男子之生也覆女子之生也仰其死於水也亦然男內陽而外陰女子反之故易曰坤至柔而動也剛書曰沈潛剛克古之達者蓋知此也秦醫和曰天有六氣淫為六疾陽淫熱疾陰淫寒疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾夫女陽物而晦時故淫則為內熱蠱惑之疾女為蠱惑世知之者眾其為陽物而內熱雖良醫未之言也五勞七傷皆熱肝而蒸晦者不為蠱則中風皆熱之所生也醫和之語吾嘗表而出之讀左氏春秋書此枲耳並根苗葉實皆濯出沙土懸陰乾淨掃地上燒為灰湯淋取濃汁泥連二灶煉之灰汁耗即旋取旁釜中已滾灰汁益之經一日夜不絕火乃漸得霜干瓷瓶盛之每服早晚臨睡酒調一錢匕補暖去風駐顏不可備言尤治皮膚風令人膚草滑淨每洗面及浴取少許如澡豆用尤佳無所忌昌圖之父從諫宜州文學家居於邕服此十餘年今七八十紅潤輕健蓋專得此藥力也杜甫詩有除𦼓草一篇今蜀中謂之毛琰毛芒可畏觸之如蜂蠆然治風疼擇最先者以此草點之一身皆失去葉背紫者入藥僕有一相識能治馬背驄有富家翁買馬值百餘千以有此病故以四十千得之已而置酒飲人求為治之酒未三行而驄以正舉座大笑其方用烹豬湯一味暖令熱浴之其馬隨手即正不復回良久乃以少冷水洗之此物能令馬尾軟細及治焦禿頻以洗之不月餘效極神良秘之秘之馬肺損鼻中出膿醫所不療云肺藥率用涼冷須食上飲之而肺痛畏草所制不敢食草若不食而飲涼藥是速其死也故不醫有老卒教予以蘆菔根煮糯米作粥入少許阿膠啖之馬乃敢食食已用常肺藥入訶黎勒皮飲之涼藥為訶子所澀於肺上必愈用其言信然
